name: Valida aulas (gates do modelo)

# Trava física do PR: NENHUMA aula nova entra no main sem passar pelos gates,
# mesmo que alguém esqueça de rodar local. Arquivo NOVO = gate completo
# (estrutura + vozes por personagem + contraste computado). Arquivo MODIFICADO =
# anti-regressão (aula/stamp/slide não pode sumir, arquivo não pode encolher).

on:
  pull_request:
    paths:
      - 'public/professor/**.html'
      - 'public/aluno/**.html'
      # O estrago que mais dói NÃO chega por um arquivo de aula: chega pelo BUILDER e
      # pelo MODELO, que reescrevem centenas de aulas de uma vez. Sem estes paths, um PR
      # que mexe só no _build/ ou no scripts/ não acionava gate NENHUM — foi assim que o
      # snake() não-injetivo (2 frases -> 1 mp3) viveu meses. O GATE 8 varre o repo
      # inteiro, então é aqui que ele ganha os dentes.
      - '_build/**'
      - 'scripts/**'
      - '.github/workflows/validate-lessons.yml'

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ╔══════════════════════════════════════════════════════════════════════╗
      # ║ CANARIO — o vigia que nao confia no verde do gate.                    ║
      # ╚══════════════════════════════════════════════════════════════════════╝
      # Roda ANTES de tudo e SEM condicao: mesmo que a classificacao de arquivos
      # quebre de novo (foi o bug de 14/07 que dormiu os GATES 1-7), o canario
      # ainda roda. Ele pega fixtures propositalmente quebrados e exige que os
      # gates os REPROVEM. Se um gate passar um fixture — porque morreu, foi
      # pulado, ou teve a logica quebrada — o canario fica VERMELHO aqui, na hora,
      # em vez de meses depois quando alguem abrir a aula. Um gate verde nao prova
      # que o gate funciona; o canario prova, a cada PR, que ele ainda MORDE.
      - name: "CANARIO — prova que os gates ainda reprovam defeito conhecido"
        run: python3 scripts/canary/run.py

      # Irmao do canario, e pelo mesmo motivo: o canario prova que o gate ainda
      # MORDE; este prova que o gate ainda EXISTE. Workflow com YAML invalido nao
      # falha — ele NAO RODA (startup failure: zero jobs, zero log, zero alerta).
      # O guard-main.yml passou UM MES assim, 100 runs sem um unico job, e levou
      # junto a tag `last-good`, que ele deveria avancar a cada push limpo e ficou
      # congelada 1.683 commits atras — enquanto o arquivo mandava usa-la pra
      # "restaurar tudo a qualquer momento".
      - name: "GATE 0 — todo workflow do CI parseia e roda de verdade"
        run: |
          pip install pyyaml --quiet
          python3 scripts/check_workflows.py

      - name: Classifica arquivos de aula do PR
        id: files
        # ╔══════════════════════════════════════════════════════════════════════╗
        # ║ ESTE PASSO JA FALHOU EM SILENCIO — e levou os GATES 1-7 junto.       ║
        # ╚══════════════════════════════════════════════════════════════════════╝
        # O `git fetch --depth=1` deixava origin/main SEM HISTORICO. O `A...B` do git
        # precisa de merge base, nao achava, e morria:
        #
        #     fatal: origin/main...HEAD: no merge base
        #
        # So que o erro era ENGOLIDO pelo `| tr`: o exit code de um pipeline e o do
        # ULTIMO comando, e o tr sempre sai 0. Resultado: passo VERDE, listas VAZIAS,
        # e os sete gates seguintes saindo `skipped`. Meses de PRs de aula entraram no
        # main sem UM gate rodar — com o check verde do lado. Gate que falha em silencio
        # e pior que gate nenhum: da a sensacao de protecao sem proteger.
        #
        # Tres travas agora:
        #   1. fetch COMPLETO do base ref (sem --depth), pra existir merge base;
        #   2. `set -euo pipefail`, pra que erro em pipeline NAO seja mais engolido;
        #   3. checagem explicita: se o PR toca HTML de aula e a classificacao sai
        #      vazia, o passo FALHA em vez de passar verde sem checar nada.
        run: |
          set -euo pipefail
          BASE_REF="${{ github.base_ref }}"
          BASE="origin/$BASE_REF"

          git fetch --no-tags --prune origin "+refs/heads/$BASE_REF:refs/remotes/origin/$BASE_REF"

          if ! git merge-base "$BASE" HEAD >/dev/null 2>&1; then
            echo "::error::Sem merge base entre $BASE e HEAD — impossivel classificar os arquivos do PR."
            echo "::error::Os gates NAO podem rodar. Falhando de proposito, em vez de passar verde sem checar."
            exit 1
          fi

          ADDED=$(git diff --name-only --diff-filter=A "$BASE"...HEAD -- 'public/professor/*.html' 'public/aluno/*.html' | tr '\n' ' ')
          MODIFIED=$(git diff --name-only --diff-filter=M "$BASE"...HEAD -- 'public/professor/*.html' 'public/aluno/*.html' | tr '\n' ' ')
          TOCADOS=$(git diff --name-only "$BASE"...HEAD -- 'public/professor/*.html' 'public/aluno/*.html' | wc -l)

          # Anti-skip-silencioso: HTML de aula no diff, mas classificacao vazia = bug aqui.
          if [ "$TOCADOS" -gt 0 ] && [ -z "${ADDED// }${MODIFIED// }" ]; then
            echo "::error::$TOCADOS arquivo(s) de aula no diff, mas a classificacao saiu VAZIA."
            echo "::error::Isso significa que os GATES 1-7 seriam pulados. Falhando de proposito."
            exit 1
          fi

          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "modified=$MODIFIED" >> "$GITHUB_OUTPUT"
          echo "Arquivos de aula tocados: $TOCADOS"
          echo "Novos: $ADDED"
          echo "Modificados: $MODIFIED"

      - name: "GATE 1 — estrutura + vozes por personagem (arquivos novos)"
        if: steps.files.outputs.added != ''
        run: python3 _build/model/validate_lesson.py ${{ steps.files.outputs.added }}

      - name: "GATE 2 — contraste computado headless (arquivos novos)"
        if: steps.files.outputs.added != ''
        run: python3 _build/model/check_contrast.py ${{ steps.files.outputs.added }}

      - name: "GATE 3 — anti-regressão (arquivos modificados)"
        if: steps.files.outputs.modified != ''
        run: python3 _build/model/check_no_regression.py --base "origin/${{ github.base_ref }}" ${{ steps.files.outputs.modified }}

      - name: "GATE 4 — vazamento de aba + shell divergente (hubs tocados, novos E modificados)"
        # Trava o caso TÂNIA: accordion/Complementares vazando entre abas (ORPHAN/ESCAPE/
        # SLIDES_COMP/DIV_IMBAL/MENU_MIX) e shell pré-modelo (OLD_SHELL). Só checa HUBs
        # (ignora standalones e slugs lixo). Bloqueia o PR se algum hub tocado tiver defeito.
        if: steps.files.outputs.added != '' || steps.files.outputs.modified != ''
        run: python3 _build/model/audit_hubs_struct.py --check ${{ steps.files.outputs.added }} ${{ steps.files.outputs.modified }}

      - name: "GATE 5 — integridade de áudio (arquivos do PR: novos E modificados)"
        # Pega aula publicada apontando p/ .mp3 que NÃO existe (aula "sem som") e HTML
        # truncado/corrompido. ESCOPADO nos arquivos DO PR: a geração em curso de OUTRO
        # aluno nunca trava este gate — era exatamente o repo-inteiro no buildCommand do
        # Vercel que congelava a produção por uma única aula a meio de geração.
        if: steps.files.outputs.added != '' || steps.files.outputs.modified != ''
        run: python3 scripts/check_lesson_integrity.py ${{ steps.files.outputs.added }} ${{ steps.files.outputs.modified }}

      - name: "GATE 6 — reintrodução de padrão já consertado (novos E modificados)"
        # BLOQUEANTE também em arquivo MODIFICADO, ao contrário do validador abaixo.
        # É esse o buraco que ele tapa: uma branch ramificada ANTES de um conserto
        # sobrescreve o arquivo e reintroduz o bug ao mergear, e o anti-regressão não
        # vê (só conta ex-lesson, stamp e slide). Aconteceu em 10/07 com o alert do
        # Chrome e com os links de busca. Critério = "não piorou vs a base", não
        # "zero" — 49 páginas legadas ainda têm link de busca e travar todo PR que as
        # toque seria pior que o bug.
        if: steps.files.outputs.added != '' || steps.files.outputs.modified != ''
        run: python3 scripts/check_forbidden_patterns.py --base "origin/${{ github.base_ref }}" ${{ steps.files.outputs.added }} ${{ steps.files.outputs.modified }}

      - name: "GATE 7 — botão morto: JS inline que não compila (novos E modificados)"
        # Pega o BOTÃO QUE NÃO FUNCIONA. O gerador concatena o inglês do aluno dentro
        # de uma string JS dentro de um atributo HTML; o apóstrofo vira &#39;, o browser
        # DESESCAPA antes de compilar, a string fecha errado e o handler morre:
        #   onclick="speakText('Rachel&#39;s task is done.',this)"  -> SyntaxError no clique
        # Invisível para todo mundo: HTML válido, página abre, console limpo — o Chrome
        # só compila handler inline NA HORA DO CLIQUE. Nenhum validador olhava os
        # ATRIBUTOS (o audiomap checker só parseia dentro do <script>). Era o ponto cego,
        # e é exatamente onde o texto do aluno entra: 324 botões mortos em 48 arquivos
        # (169 de áudio = a aula não toca som; 155 de gabarito = a resposta não abre).
        # Usa new Function() = V8 = o motor do Chrome. Não simula o browser: usa o browser.
        # Critério "não piorou vs a base" (igual GATE 6) enquanto o legado não é consertado.
        if: steps.files.outputs.added != '' || steps.files.outputs.modified != ''
        run: node scripts/check_inline_js.mjs --base "origin/${{ github.base_ref }}" ${{ steps.files.outputs.added }} ${{ steps.files.outputs.modified }}

      - name: "GATE 8 — o legado não piora (varre o REPO INTEIRO, não só o diff)"
        # TODOS os outros gates olham apenas os arquivos que o PR mudou. Um arquivo que
        # quebrou e que ninguém mais tocou nunca mais é olhado — o defeito fica escondido
        # até alguém encostar naquele aluno, e aí "aparece", como se tivesse nascido ali.
        #
        # E o jeito que as coisas quebram aqui NÃO é pelo diff: é por efeito colateral.
        # Mexer no builder / no modelo / rodar um retrofit escreve em centenas de arquivos
        # que o PR nem lista. Casos reais: o checkout defasado que apagou as aulas 6-10 de
        # 4 hubs; um regex guloso que ia reescrever 2.182 arquivos em vez de 48.
        #
        # Este gate NÃO exige legado limpo (são 3.243 defeitos herdados, 1.428 arquivos —
        # isso é campanha, não gate; e aula já dada NÃO se mexe). Ele exige uma coisa só:
        #   NENHUM ARQUIVO GANHA UM DEFEITO QUE NÃO TINHA.
        # O legado é o alvará congelado em scripts/legacy-baseline.json. Só pode CAIR.
        # ~45s para 2.217 arquivos. Não escreve em nada: é alarme, não é reforma.
        run: python3 scripts/check_legacy_baseline.py

      - name: "GATE 9 — gramática não repete entre aulas (REGRA 22, data-grammar)"
        # O irmão gramatical do check_vocab_progression: um data-grammar (posto pelo builder
        # no slide de Grammar Discovery) ensinado como NOVO em 2+ aulas do MESMO aluno = FAIL.
        # LEGADO-TOLERANTE por construção: aula sem data-grammar é ignorada, então nunca
        # dispara em aula antiga (que não tem o marcador) nem exige retrofit. Roda por SLUG
        # tocado, comparando a aula nova contra as irmãs já publicadas do mesmo aluno.
        if: steps.files.outputs.added != '' || steps.files.outputs.modified != ''
        run: |
          set -euo pipefail
          slugs=$(for f in ${{ steps.files.outputs.added }} ${{ steps.files.outputs.modified }}; do
            b=$(basename "$f" .html); echo "$b" | sed -E 's/-aula[0-9]+$//'
          done | sort -u)
          rc=0
          for s in $slugs; do
            files=$(ls public/professor/${s}-aula*.html 2>/dev/null || true)
            if [ -n "$files" ]; then
              echo "— aluno: $s"
              python3 _build/model/check_grammar_progression.py $files || rc=1
            fi
          done
          exit $rc

      - name: "Validador em modo AVISO (arquivos modificados — não bloqueia legado)"
        if: steps.files.outputs.modified != ''
        continue-on-error: true
        run: python3 _build/model/validate_lesson.py ${{ steps.files.outputs.modified }}
