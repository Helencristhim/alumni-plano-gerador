<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Word Arena — Alumni</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage" id="stage">
    <!-- HUD -->
    <div class="hud">
      <div class="hud-item"><span class="hud-label">Deck</span><span class="hud-value" id="hud-deck">—</span></div>
      <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="hud-score">0</span></div>
      <div class="hud-item"><span class="hud-label">Streak</span><span class="hud-value" id="hud-streak">🔥0</span></div>
      <div class="hud-item"><span class="hud-label">Question</span><span class="hud-value" id="hud-progress">0/8</span></div>
    </div>

    <button class="icon-btn mute-btn" id="mute-btn" aria-label="Sound">🔊</button>
    <button class="icon-btn back-btn" id="back-btn" aria-label="Back">⬅</button>

    <!-- Área do jogo -->
    <div class="play" id="play">
      <div class="mascot" id="mascot">🦊</div>
      <div class="bubble" id="bubble">
        <span id="word">level</span>
        <button class="say-btn" id="say-btn" aria-label="Listen to the word">🔊</button>
      </div>
      <div class="answers" id="answers"></div>
    </div>

    <!-- Tela inicial: escolher o deck -->
    <div class="overlay" id="overlay-start">
      <div class="overlay-card">
        <div class="big-mascot">🦊</div>
        <h1>Word Arena</h1>
        <p>Listen to the word, pick the right meaning. Pick a deck to start!</p>
        <div class="deck-grid" id="deck-grid"></div>
      </div>
    </div>

    <!-- Tela de resultado -->
    <div class="overlay hidden" id="overlay-result">
      <div class="overlay-card">
        <div class="big-mascot" id="result-mascot">🏆</div>
        <h1 id="result-title">Well done!</h1>
        <div class="stars" id="result-stars">★★★</div>
        <p id="result-text">You got 8 of 8!</p>
        <div class="result-btns">
          <button class="btn" id="again-btn">PLAY AGAIN ▶</button>
          <button class="btn btn-soft" id="menu-btn">CHOOSE DECK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
