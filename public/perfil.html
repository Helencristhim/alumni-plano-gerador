                '- Production: Role-play com imprevistos. Discussão aberta. 15-20 min.\n' +
                '- Mídias: Filmes/séries com legendas EN, podcasts intermediários, TED Talks.\n' +
                '- Padrão de cortesia: "Would you mind...?" / "I was wondering if..." / "Could I possibly...?"\n',
            'b2': 'B2 (Intermediário Superior):\n' +
                '- Pre-teach: Sem tradução. Collocations, phrasal verbs. Definições em inglês.\n' +
                '- Teach: Textos autênticos. Registro formal vs informal. CCQs complexas.\n' +
                '- Practice: Paráfrase, análise de registro, gap-fill com múltiplas opções.\n' +
                '- Production: Debates, apresentações, negociações, escrita de e-mails. 20 min.\n' +
                '- Mídias: Sem legenda, podcasts nativos, documentários.\n' +
                '- Padrão de cortesia: Registro formal completo — hedging, softening, diplomatic language.\n',
            'c1': 'C1/C2 (Avançado/Proficiente):\n' +
                '- Zero tradução. Material 100% autêntico. Análise crítica, estilo, tom, registro.\n' +
                '- Production: Debates complexos, apresentações profissionais, escrita argumentativa. 20+ min.\n' +
                '- Padrão de cortesia: Full register awareness — formal, semi-formal, informal. Strategic ambiguity.\n'
        };

        // Detect level key
        var selectedKey = 'b1'; // default
        if (nivelKey.includes('a1')) selectedKey = 'a1';
        else if (nivelKey.includes('a2')) selectedKey = 'a2';
        else if (nivelKey.includes('b1+') || nivelKey.includes('b1 ') || nivelKey.includes('b1(') || nivelKey === 'b1') selectedKey = 'b1';
        else if (nivelKey.includes('b2')) selectedKey = 'b2';
        else if (nivelKey.includes('c1') || nivelKey.includes('c2')) selectedKey = 'c1';

        return 'ADEQUAÇÃO POR NÍVEL (aplicar SOMENTE este nível):\n\n' +
            levelSpecs[selectedKey] + '\n' +

            'MODELO PPP OBRIGATÓRIO (estrutura de CADA aula de ' + ((perfil.dadosFormulario || {}).duracao || '60 min') + '):\n' +
            (function() {
              var dur = parseInt((perfil.dadosFormulario || {}).duracao) || 60;
              if (dur >= 90) {
                return 'FASE 1 — WARM-UP + CALLBACK (10 min):\n' +
                  '  - 2-3 perguntas abertas sobre a semana do aluno (em inglês)\n' +
                  '  - Callback: revisar 3-4 palavras/frases da AULA ANTERIOR — professor pergunta, aluno responde sem olhar\n' +
                  '  - Revisão do homework: aluno apresenta brevemente o que fez, professor dá feedback rápido\n' +
                  '  MATERIAL: perguntas na tela (Tab 4) + instruções no Teacher Guide (Tab 3)\n\n' +

                  'FASE 2 — VOCABULARY DEEP-DIVE (15 min):\n' +
                  '  - 7-10 palavras/expressões novas para aula de 90 min (não 5)\n' +
                  '  - Para cada palavra: imagem + exemplo em contexto + áudio + drilling (professor fala, aluno repete 3x)\n' +
                  '  - Atividade: professor fala situação em PT, aluno diz a palavra/frase em EN\n' +
                  '  CONEXÃO COM PRE-CLASS: o aluno já viu estas palavras nos exercícios do Pre-class. Aqui o professor APROFUNDA com exemplos DIFERENTES e drilling oral.\n' +
                  '  MATERIAL: vocab cards com frases NOVAS na tela (Tab 4) + notas de drilling no Teacher Guide (Tab 3)\n\n' +

                  'FASE 3 — CONTEXT/DIALOGUE (10 min):\n' +
                  '  - Diálogo situacional de 10-15 linhas usando TODO o vocabulário da fase 2\n' +
                  '  - Professor e aluno leem o diálogo em voz alta (professor = personagem A, aluno = personagem B)\n' +
                  '  - Depois: invertem os papéis\n' +
                  '  - Áudio do diálogo completo disponível via ElevenLabs\n' +
                  '  MATERIAL: diálogo com avatares na tela (Tab 4) + instruções no Teacher Guide (Tab 3)\n\n' +

                  'FASE 4 — GRAMMAR FOCUS + CCQs (10 min):\n' +
                  '  - 1-2 estruturas gramaticais em contexto (NÃO aula de gramática abstrata)\n' +
                  '  - Exemplos visuais na tela usando vocabulário da aula\n' +
                  '  - 2-3 CCQs escritas no material, professor faz oralmente\n' +
                  '  MATERIAL: estrutura visual na tela (Tab 4) + CCQs escritas no Teacher Guide (Tab 3)\n\n' +

                  'FASE 5 — CONTROLLED PRACTICE (15 min):\n' +
                  '  - 3 exercícios ORAIS guiados pelo professor (NÃO os mesmos do Pre-class):\n' +
                  '    a) Oral Drilling: professor fala situação em PT → aluno responde em EN (5 situações)\n' +
                  '    b) Listening Comprehension: professor toca áudio → aluno interpreta e responde (3 áudios)\n' +
                  '    c) Sentence Building: professor dá palavras soltas → aluno monta frase completa (5 frases)\n' +
                  '  CONEXÃO: usa o MESMO vocabulário do Pre-class mas em exercícios DIFERENTES e ORAIS\n' +
                  '  MATERIAL: situações na tela (Tab 4) + respostas esperadas no Teacher Guide (Tab 3)\n\n' +

                  'FASE 6 — SEMI-FREE PRACTICE (10 min):\n' +
                  '  - Role-play GUIADO com script parcial: aluno tem as primeiras palavras de cada fala\n' +
                  '  - Cenário conectado ao contexto profissional/pessoal do aluno\n' +
                  '  - Professor faz um papel, aluno faz outro\n' +
                  '  MATERIAL: cenário + script parcial na tela (Tab 4) + dicas no Teacher Guide (Tab 3)\n\n' +

                  'FASE 7 — FREE PRODUCTION (15 min):\n' +
                  '  - Role-play LIVRE sem script — mesmo cenário da fase 6 mas sem apoio\n' +
                  '  - Professor NÃO corrige durante a produção (delayed feedback)\n' +
                  '  - Aluno deve usar vocabulário, gramática e frases-modelo da aula inteira\n' +
                  '  MATERIAL: apenas o cenário/prompt na tela (Tab 4) + observações para anotar no Teacher Guide (Tab 3)\n\n' +

                  'FASE 8 — DELAYED ERROR CORRECTION (5 min):\n' +
                  '  - Professor compartilha 3-5 erros anotados durante a produção livre\n' +
                  '  - Para cada erro: o que o aluno disse → o que deveria ter dito\n' +
                  '  - Aluno repete a versão correta\n' +
                  '  MATERIAL: espaço para anotações no Teacher Guide (Tab 3)\n\n' +

                  'FASE 9 — WRAP-UP + CHECKLIST (5 min):\n' +
                  '  - Survival Card: revisão das frases-chave da aula com áudio\n' +
                  '  - Checklist "O que eu aprendi": professor lê cada item, aluno confirma\n' +
                  '  - Preview da próxima aula + homework\n' +
                  '  MATERIAL: survival card + checklist na tela (Tab 4) + homework no Teacher Guide (Tab 3)\n\n' +

                  'TOTAL: 95 min de conteúdo planejado para 90 min de aula (margem de segurança).\n' +
                  'NUNCA entregar material insuficiente. Cada fase DEVE ter conteúdo detalhado e específico no HTML.\n' +
                  'Se o professor terminar antes, usar o conteúdo extra. Se não der tempo, a fase 8 pode ser reduzida.\n\n';
              } else if (dur >= 75) {
                return '- Warm-up + Lead-in (10 min): 3-5 perguntas abertas\n' +
                  '- Presentation — Pre-teach (10 min): Vocabulário + exemplo + drilling\n' +
                  '- Presentation — Teach + CCQs (10 min): Vocabulário em contexto + 2-3 CCQs\n' +
                  '- Practice (15 min): 2-3 exercícios controlados variados\n' +
                  '- Production (20 min): Role-play livre. Delayed feedback.\n' +
                  '- Wrap-up (10 min): Revisão + checklist\n' +
                  'TOTAL: 75 min.\n\n';
              } else {
                return '- Warm-up + Lead-in (5 min): 3-5 perguntas abertas\n' +
                  '- Presentation — Pre-teach (10 min): Vocabulário + exemplo + drilling\n' +
                  '- Presentation — Teach + CCQs (10 min): Vocabulário em contexto + 2-3 CCQs\n' +
                  '- Practice (10-15 min): 2 exercícios controlados variados\n' +
                  '- Production (10-15 min): Role-play livre. Delayed feedback.\n' +
                  '- Wrap-up (5 min): Revisão\n' +
                  'TOTAL: 60 min.\n\n';
              }
            })() +

            '5 ABAS DO MATERIAL DO PROFESSOR:\n' +
            '1. Planejamento Pedagógico: Visão geral do programa + currículo completo em tabela\n' +
            '2. Pre-class: Exercícios interativos (usa exercises.js)\n' +
            '3. Plano de Aula: Roteiro PPP minuto a minuto + Teacher Guide\n' +
            '4. Material do Professor: Conteúdo PPP para tela compartilhada (sem traduções/respostas). DEVE espelhar EXATAMENTE as fases do Plano de Aula (Tab 3): Warm-up → Vocabulary → Context/Dialogue → Grammar → Practice → Production → Wrap-up. Cada seção do Material do Professor corresponde a um passo do Plano de Aula — o professor abre o Plano de Aula para ver as instruções e compartilha o Material do Professor na tela para o aluno ver o conteúdo.\n' +
            '5. Atividades Complementares: Filmes, séries e podcasts por aula';
    }

    // ===== UTILS =====
    function esc(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ===== START =====
    init();
</script>
</body>
</html>
