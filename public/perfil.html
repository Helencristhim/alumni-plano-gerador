<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni — Perfil 360</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles/design-system.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/lib/profile-schema.js"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        /* ── PAGE-SPECIFIC: Status Controls ── */
        .status-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
            margin-bottom: var(--space-xl);
            box-shadow: var(--shadow-sm);
        }

        .countdown { font: var(--text-small); color: var(--text-dim); margin-left: auto; }
        .countdown strong { color: var(--alumni-navy); }

        .save-indicator { font: var(--text-small); color: var(--success); opacity: 0; transition: opacity var(--transition-slow); margin-left: var(--space-sm); }
        .save-indicator.show { opacity: 1; }

        /* ── PAGE-SPECIFIC: Editable fields ── */
        .editable { outline: none; border: 1px solid transparent; border-radius: var(--radius-sm); padding: var(--space-xs); transition: border-color var(--transition-base); min-height: 1.5em; }
        .editable:hover { border-color: var(--border); }
        .editable:focus { border-color: var(--border-focus); background: var(--bg-subtle); }
        .editable p, .editable-p { font: var(--text-base); color: var(--text-muted); line-height: 1.8; }

        /* ── PAGE-SPECIFIC: Frases textuais ── */
        .frase-item { background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--space-md); margin-bottom: var(--space-sm); }
        .frase-quote { font: 500 1.05rem/1.5 var(--font-display); font-style: italic; color: var(--text-primary); margin-bottom: var(--space-xs); }
        .frase-quote::before { content: '\201C'; color: var(--alumni-navy); font-size: 1.3rem; margin-right: 0.2rem; }
        .frase-quote::after { content: '\201D'; color: var(--alumni-navy); font-size: 1.3rem; margin-left: 0.2rem; }
        .frase-meta { font: var(--text-small); color: var(--text-dim); }
        .frase-meta span { margin-right: var(--space-md); }

        /* ── PAGE-SPECIFIC: Personality Map bars ── */
        .eixo-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 24px 28px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); transition: box-shadow 0.2s; }
        .eixo-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .eixo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .eixo-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.01em; }
        .eixo-badges { display: flex; align-items: center; gap: var(--space-sm); }
        .eixo-seal { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 0.02em; }
        .seal-green { background: var(--success-bg); color: var(--success); }
        .seal-yellow { background: var(--warning-bg); color: var(--warning); }
        .seal-orange { background: rgba(194, 65, 12, 0.06); color: #c2410c; }
        .seal-red { background: var(--error-bg); color: var(--error); }
        .eixo-confidence { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 12px; color: #9ca3af; font-weight: 500; }

        .eixo-bar-container { background: #f0f0f0; border-radius: 6px; height: 8px; margin-bottom: 16px; overflow: hidden; position: relative; }
        .eixo-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
        .eixo-bar-fill.low { background: linear-gradient(90deg, #ef4444, #f87171); }
        .eixo-bar-fill.mid-low { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .eixo-bar-fill.mid { background: linear-gradient(90deg, #003080, #2563eb); }
        .eixo-bar-fill.mid-high { background: linear-gradient(90deg, #059669, #34d399); }
        .eixo-bar-fill.high { background: linear-gradient(90deg, #003080, #0ea5e9); }

        .eixo-labels { display: flex; justify-content: space-between; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 11px; color: #9ca3af; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .eixo-labels .eixo-val-center { font-size: 14px; font-weight: 700; color: #003080; text-transform: none; letter-spacing: 0; }
        .eixo-inference { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 14px; line-height: 1.7; color: #4b5563; margin-bottom: 12px; padding: 12px 16px; background: #f9fafb; border-radius: 10px; border-left: 3px solid #003080; }

        /* ── PAGE-SPECIFIC: Evidence toggle ── */
        .eixo-evidences { display: none; margin-top: var(--space-sm); padding: var(--space-sm); background: var(--bg-subtle); border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .eixo-evidences.show { display: block; }
        .eixo-evidences li { font: var(--text-small); color: var(--text-dim); margin-bottom: var(--space-xs); margin-left: var(--space-md); }
        .eixo-actions { display: flex; gap: 8px; margin-top: 8px; }
        .eixo-actions .btn { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: #fff; color: #374151; cursor: pointer; transition: all 0.15s; }
        .eixo-actions .btn:hover { background: #f3f4f6; border-color: #003080; color: #003080; }

        /* ── PAGE-SPECIFIC: Ajuste slider ── */
        .ajuste-input { display: none; align-items: center; gap: var(--space-sm); margin-top: var(--space-sm); }
        .ajuste-input.show { display: flex; }
        .ajuste-input input[type="range"] { flex: 1; accent-color: var(--alumni-navy); }
        .ajuste-input span { font: var(--text-small); font-weight: 600; color: var(--alumni-navy); min-width: 2rem; text-align: center; }

        /* ── PAGE-SPECIFIC: Strengths / Weaknesses ── */
        .sw-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); }
        .sw-header { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-md); font: var(--text-micro); }
        .sw-card.strengths .sw-header { color: var(--success); }
        .sw-card.weaknesses .sw-header { color: var(--error); }
        .sw-dot { width: 8px; height: 8px; border-radius: var(--radius-full); }
        .sw-card.strengths .sw-dot { background: var(--success); }
        .sw-card.weaknesses .sw-dot { background: var(--error); }
        .sw-card ul { list-style: none; }
        .sw-card li { padding: var(--space-sm) 0; font: var(--text-base); color: var(--text-muted); border-bottom: 1px solid var(--border); padding-left: 1.2rem; position: relative; }
        .sw-card li:last-child { border-bottom: none; }
        .sw-card.strengths li::before { content: '+'; position: absolute; left: 0; color: var(--success); font-weight: 700; }
        .sw-card.weaknesses li::before { content: '\2014'; position: absolute; left: 0; color: var(--error); font-weight: 700; }
        .sw-seal { font: var(--text-micro); padding: 2px var(--space-xs); border-radius: 10px; margin-left: var(--space-xs); }
        .sw-evidence { font: var(--text-small); color: var(--text-dim); font-style: italic; display: block; margin-top: var(--space-xs); }

        /* ── PAGE-SPECIFIC: Info grid cards ── */
        .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-md); box-shadow: var(--shadow-sm); }
        .info-label { font: var(--text-micro); color: var(--text-dim); margin-bottom: var(--space-xs); }
        .info-value { font: var(--text-base); color: var(--text-primary); }
        .info-value strong { color: var(--text-primary); font-weight: 600; }

        /* ── PAGE-SPECIFIC: Professor ── */
        .professor-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); }
        .professor-card h4 { font: var(--text-h2); color: var(--text-primary); margin-bottom: var(--space-sm); }
        .professor-justificativas { list-style: none; margin-top: var(--space-sm); }
        .professor-justificativas li { padding: var(--space-xs) 0; font: var(--text-base); color: var(--text-muted); padding-left: 1.2rem; position: relative; }
        .professor-justificativas li::before { content: '\2022'; position: absolute; left: 0; color: var(--alumni-navy); font-weight: 700; }

        .professor-nome-label { font: var(--text-micro); color: var(--alumni-navy); margin-bottom: var(--space-xs); display: block; }

        /* ── PAGE-SPECIFIC: Collapsible sections ── */
        .collapsible-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; padding: var(--space-md) var(--space-lg); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: var(--space-sm); box-shadow: var(--shadow-sm); }
        .collapsible-header h3 { font: var(--text-h2); color: var(--text-primary); }
        .collapsible-icon { color: var(--text-dim); font-size: 0.7rem; transition: transform var(--transition-slow); }
        .collapsible-header.open .collapsible-icon { transform: rotate(180deg); }
        .collapsible-body { display: none; padding: var(--space-md) 0; }
        .collapsible-body.show { display: block; animation: fadeIn var(--transition-slow); }

        .sub-section { margin-bottom: var(--space-lg); }
        .sub-section h4 { font: var(--text-micro); color: var(--alumni-navy); margin-bottom: var(--space-sm); }

        textarea.edit-area { width: 100%; min-height: 120px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-subtle); padding: var(--space-md); font: var(--text-base); color: var(--text-body); resize: vertical; outline: none; line-height: 1.7; }
        textarea.edit-area:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--alumni-navy-ring); }
        textarea.edit-area::placeholder { color: var(--text-dim); }

        audio { width: 100%; margin-top: var(--space-sm); }
        .audio-placeholder { background: var(--bg-subtle); border: 1px dashed var(--border); border-radius: var(--radius-sm); padding: var(--space-lg); text-align: center; color: var(--text-dim); font: var(--text-base); }

        /* ── PAGE-SPECIFIC: Generation section ── */
        .generate-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); }

        .url-row { display: flex; gap: var(--space-sm); margin-top: var(--space-md); align-items: center; }

        /* ── PAGE-SPECIFIC: Prompt preview modal ── */
        .modal-header { padding: var(--space-md) var(--space-lg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font: var(--text-h2); color: var(--text-primary); }
        .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.2rem; padding: var(--space-xs); }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: var(--space-lg); overflow-y: auto; flex: 1; }
        .modal-body textarea { width: 100%; min-height: 400px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg-subtle); padding: var(--space-md); font: 0.75rem/1.7 var(--font-mono); color: var(--text-muted); resize: vertical; outline: none; }
        .modal-body textarea:focus { border-color: var(--border-focus); }
        .modal-footer { padding: var(--space-md) var(--space-lg); border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: var(--space-sm); }

        /* ── PAGE-SPECIFIC: Validation modal ── */
        .validation-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: calc(var(--z-modal) + 10); display: none; align-items: center; justify-content: center; padding: var(--space-xl); }
        .validation-modal.show { display: flex; }
        .validation-modal .modal { max-width: 560px; }
        .validation-modal .modal-header h3 { color: var(--error); }
        .validation-modal .validation-list { list-style: none; padding: 0; margin: 0; }
        .validation-modal .validation-list li { padding: var(--space-sm) 0; font: var(--text-base); color: var(--text-muted); border-bottom: 1px solid var(--border); padding-left: 1.4rem; position: relative; }
        .validation-modal .validation-list li:last-child { border-bottom: none; }
        .validation-modal .validation-list li::before { content: '\25CF'; position: absolute; left: 0; color: var(--error); font-size: 0.7rem; top: 0.6rem; }

        /* ── PAGE-SPECIFIC: Axes warning ── */
        .axes-warning { background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: var(--radius-md); padding: var(--space-md); margin-top: var(--space-md); font: var(--text-base); color: var(--warning); line-height: 1.6; }
        .axes-warning strong { color: #c2410c; }

        /* ── PAGE-SPECIFIC: Empty state ── */
        .empty-state { text-align: center; padding: var(--space-3xl) var(--space-xl); }
        .empty-state h3 { font: var(--text-h1); color: var(--text-dim); margin-bottom: var(--space-sm); }
        .empty-state p { color: var(--text-dim); font: var(--text-base); }

        /* ── Prompt modal layout override ── */
        #promptModal .modal { max-width: 800px; display: flex; flex-direction: column; }

        /* ── PAGE-SPECIFIC: Extracted Data Fields ── */
        .extracted-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-md); margin-top: var(--space-md); }
        @media (max-width: 768px) { .extracted-grid { grid-template-columns: 1fr; } }
        .extracted-field { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-md); box-shadow: var(--shadow-sm); position: relative; }
        .extracted-field.not-found { background: #fffbeb; border-color: #f59e0b; }
        .extracted-field__header { display: flex; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-xs); }
        .extracted-field__label { font: var(--text-micro); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .extracted-field__seal { width: 10px; height: 10px; border-radius: var(--radius-full); display: inline-block; flex-shrink: 0; }
        .extracted-field__seal.seal-green { background: var(--success); }
        .extracted-field__seal.seal-yellow { background: var(--warning); }
        .extracted-field__seal.seal-orange { background: #c2410c; }
        .extracted-field__seal.seal-red { background: var(--error); }
        .extracted-field__edited { font: var(--text-micro); background: var(--info-bg, rgba(59,130,246,0.08)); color: var(--info, #2563eb); padding: 1px var(--space-xs); border-radius: 8px; margin-left: var(--space-xs); }
        .extracted-field__evidence { font: var(--text-small); color: var(--text-dim); font-style: italic; margin-top: var(--space-xs); line-height: 1.4; }
        .extracted-field__notfound { font: var(--text-small); color: #92400e; margin-top: var(--space-xs); }
        .extracted-field input, .extracted-field select, .extracted-field textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: var(--space-sm); font: var(--text-base); color: var(--text-primary); background: var(--bg-subtle); outline: none; }
        .extracted-field input:focus, .extracted-field select:focus, .extracted-field textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--alumni-navy-ring); }
        .extracted-field textarea { min-height: 80px; resize: vertical; line-height: 1.6; }
        .extracted-section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); margin-bottom: var(--space-xl); }

        @media (max-width: 640px) {
            .status-bar { flex-direction: column; align-items: stretch; }
            .countdown { margin-left: 0; }
            .url-row { flex-direction: column; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/lib/supabase-config.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="alumni-header">
    <img src="/assets/logo-alumni.png" alt="Alumni by Better" class="alumni-header__logo">
    <span class="alumni-header__title">Perfil 360</span>
    <span class="alumni-header__badge">VISÃO GESTOR</span>
</header>

<!-- NAV -->
<nav class="alumni-nav">
    <a href="index.html">Novo Aluno</a>
    <a href="dashboard.html">Planos Gerados</a>
    <a href="#" class="active">Perfil 360</a>
</nav>

<!-- HEADER INFO (populated by JS) -->
<div style="padding:var(--space-lg) var(--space-2xl);text-align:center;border-bottom:1px solid var(--border-light);background:var(--bg-card);">
    <h1 class="h1" id="studentName">Carregando...</h1>
    <p class="text-muted" id="studentSubtitle" style="margin-top:var(--space-xs);"></p>
    <span class="badge badge--draft" id="statusBadge" style="margin-top:var(--space-sm);"></span>
</div>

<div class="container" id="mainContent">
    <!-- Populated by JS -->
</div>

<!-- PROMPT MODAL -->
<div class="modal-overlay" id="promptModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Prompt para Claude Code</h3>
            <button class="modal-close" onclick="fecharModal()">&times;</button>
        </div>
        <div class="modal-body">
            <textarea id="promptText"></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn--secondary btn--sm" id="copyPromptBtn" onclick="copiarPrompt()">Copiar Prompt</button>
        </div>
    </div>
</div>

<!-- VALIDATION MODAL -->
<div class="validation-modal" id="validationModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Validação do Perfil</h3>
            <button class="modal-close" onclick="fecharValidationModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p class="text-muted" style="margin-bottom:var(--space-md);">Os seguintes itens precisam ser preenchidos antes de aprovar o perfil:</p>
            <ul class="validation-list" id="validationList"></ul>
        </div>
        <div class="modal-footer">
            <button class="btn btn--danger btn--sm" onclick="fecharValidationModal()">Fechar</button>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="alumni-footer">
    <img src="/assets/logo-alumni.png" alt="Alumni by Better" class="alumni-footer__logo">
</footer>

<script>
    // ===== STATE =====
    let perfil = null;
    let perfilId = null;
    let saveTimeout = null;

    // ===== INIT =====
    function init() {
        const params = new URLSearchParams(window.location.search);
        perfilId = params.get('id');
        if (!perfilId) {
            showEmpty('Nenhum perfil selecionado', 'Acesse esta página com ?id=slug-do-aluno');
            return;
        }
        loadPerfil();
    }

    // ===== LOAD =====
    async function loadPerfil() {
        // 1. Supabase is source of truth
        try {
            var resp = await sb.from('perfis').select('data').eq('id', perfilId).single();
            if (!resp.error && resp.data && resp.data.data) {
                perfil = resp.data.data;
                localStorage.setItem('alumni-perfil-' + perfilId, JSON.stringify(perfil));
            }
        } catch(e) {}
        // 2. Fallback to server JSON file
        if (!perfil) {
            try {
                var fr = await fetch('/perfis/' + perfilId + '.json');
                if (fr.ok) { perfil = await fr.json(); localStorage.setItem('alumni-perfil-' + perfilId, JSON.stringify(perfil)); }
            } catch(e) {}
        }
        // 3. Fallback to localStorage
        if (!perfil) {
            var raw = localStorage.getItem('alumni-perfil-' + perfilId);
            if (!raw) { showEmpty('Perfil não encontrado', 'Não há dados para o id "' + perfilId + '".'); return; }
            try { perfil = JSON.parse(raw); } catch(e) { showEmpty('Erro ao carregar perfil', 'Os dados estão corrompidos.'); return; }
        }
        // Schema validation before rendering
        if (typeof validateAgainstSchema === 'function') {
            var schemaResult = validateAgainstSchema(perfil);
            if (!schemaResult.valid) {
                console.warn('REGRESSÃO DETECTADA — perfil com erros de schema:', schemaResult.errors);
                // Show warning banner
                var warningHtml = '<div style="background:var(--warning-bg);border:1px solid var(--warning-border);border-radius:var(--radius-md);padding:var(--space-md) var(--space-lg);margin-bottom:var(--space-lg);">' +
                    '<strong style="color:var(--warning);">Perfil com dados incompletos</strong>' +
                    '<ul style="margin-top:var(--space-sm);font-size:0.82rem;color:var(--text-muted);">';
                schemaResult.errors.forEach(function(e) {
                    warningHtml += '<li>' + e.field + ': ' + e.message + '</li>';
                });
                warningHtml += '</ul></div>';
                document.getElementById('mainContent').innerHTML = warningHtml + document.getElementById('mainContent').innerHTML;
            }
            if (schemaResult.warnings.length > 0) {
                console.info('Schema avisos:', schemaResult.warnings.map(function(w) { return w.field + ': ' + w.message; }));
            }
        }
        preRenderValidation(perfil);
        renderAll();
    }

    function showEmpty(title, msg) {
        document.getElementById('studentName').textContent = 'Perfil 360';
        document.getElementById('mainContent').innerHTML = '<div class="empty-state"><h3>' + title + '</h3><p>' + msg + '</p></div>';
    }

    // ===== SAVE =====
    function savePerfil() {
        if (!perfil || !perfilId) return;
        perfil.updatedAt = new Date().toISOString();
        localStorage.setItem('alumni-perfil-' + perfilId, JSON.stringify(perfil));
        // Save to Supabase (primary)
        var d = perfil.dadosFormulario || {};
        sb.from('perfis').upsert({
            id: perfilId, data: perfil, status: perfil.status || 'rascunho',
            nome: d.nome || perfilId, nivel: d.nivel || '',
            num_aulas: parseInt(d.numAulas) || 0, foco: d.foco || ''
        }).then(function(r){ if(r.error) console.error('Supabase save error:', r.error); });
        showSaveIndicator();
    }

    async function regerarPerfil() {
        if (!confirm('Regerar o Perfil 360? Isso vai reprocessar a consultoria e substituir o perfil atual.\n\nOs dados do formulário (nome, nível, etc.) serão mantidos. Apenas a análise da IA será regenerada.')) return;

        var btn = document.getElementById('btnRegerar');
        if (btn) { btn.disabled = true; btn.textContent = 'Regerando...'; }

        // Show progress bar below the button
        var progressDiv = document.createElement('div');
        progressDiv.id = 'regerarProgress';
        progressDiv.style.cssText = 'margin-top:12px;';
        progressDiv.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
            '<span id="regerarLabel" style="font:500 0.8rem/1.4 var(--font-body);color:var(--text-body);">Preparando dados...</span>' +
            '<span id="regerarPct" style="font:600 0.8rem/1.4 var(--font-body);color:var(--alumni-navy);">0%</span></div>' +
            '<div style="height:6px;background:var(--bg-subtle);border-radius:3px;overflow:hidden;">' +
            '<div id="regerarBar" style="height:100%;width:0%;background:var(--alumni-navy);border-radius:3px;transition:width 0.4s ease-out;"></div></div>';
        if (btn && btn.parentNode) btn.parentNode.insertBefore(progressDiv, btn.nextSibling);

        function rProg(pct, label) {
            var bar = document.getElementById('regerarBar');
            var lbl = document.getElementById('regerarLabel');
            var pctEl = document.getElementById('regerarPct');
            if (bar) bar.style.width = pct + '%';
            if (lbl) lbl.textContent = label;
            if (pctEl) pctEl.textContent = pct + '%';
        }

        rProg(5, 'Enviando dados do perfil...');
        var rTimers = [
            setTimeout(function() { rProg(15, 'Analisando transcrição...'); }, 3000),
            setTimeout(function() { rProg(30, 'Extraindo perfil do aluno...'); }, 10000),
            setTimeout(function() { rProg(45, 'Gerando mapa de personalidade...'); }, 25000),
            setTimeout(function() { rProg(60, 'Definindo necessidades pedagógicas...'); }, 45000),
            setTimeout(function() { rProg(75, 'Construindo promessa transformadora...'); }, 65000),
            setTimeout(function() { rProg(85, 'Montando justificativa do programa...'); }, 85000),
            setTimeout(function() { rProg(92, 'Validando coerência...'); }, 105000),
            setTimeout(function() { rProg(96, 'Finalizando...'); }, 120000),
        ];

        try {
            var formData = perfil.dadosFormulario || {};
            // Preserve edited dadosExtraidos values back into formData
            var de = (perfil.perfil && perfil.perfil.dadosExtraidos) || perfil.dadosExtraidos || {};
            ['idade','profissao','cidade','nivel','foco','historico'].forEach(function(k) {
                if (de[k] && de[k].valor) formData[k] = de[k].valor;
            });

            var body = Object.assign({}, formData);
            // Include transcricao if available
            if (perfil.transcricao) body.transcricao = perfil.transcricao;
            if (perfil.observacoesProfessor) body.observacoesProfessor = perfil.observacoesProfessor;

            var controller = new AbortController();
            var timeoutId = setTimeout(function() { controller.abort(); }, 300000);

            var resp = await fetch('/api/perfil-360', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: controller.signal
            });

            clearTimeout(timeoutId);

            if (!resp.ok) throw new Error('API retornou ' + resp.status);

            var result = await resp.json();

            // Merge: keep form data, replace AI analysis
            perfil.perfil = result.perfil || result;
            perfil.status = 'rascunho';
            perfil.temasAulas = ''; // Reset temas for manager to re-fill
            savePerfil();

            rTimers.forEach(function(t) { clearTimeout(t); });
            rProg(100, 'Perfil 360 regenerado!');
            await new Promise(function(r) { setTimeout(r, 800); });
            location.reload();
        } catch(e) {
            rTimers.forEach(function(t) { clearTimeout(t); });
            var errPopup = document.createElement('div');
            errPopup.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;';
            errPopup.innerHTML = '<div style="background:#fff;border-radius:12px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center;">' +
                '<h3 style="font:600 1.1rem/1.3 var(--font-body);margin-bottom:8px;">Erro ao regerar perfil</h3>' +
                '<p style="font:400 0.9rem/1.6 var(--font-body);color:var(--text-muted);margin-bottom:24px;">' + (e.message || 'Erro desconhecido') + '</p>' +
                '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:10px 32px;background:var(--alumni-navy);color:#fff;border:none;border-radius:8px;font:600 0.9rem/1.4 var(--font-body);cursor:pointer;">OK</button></div>';
            document.body.appendChild(errPopup);
            if (btn) { btn.disabled = false; btn.textContent = 'Regerar Perfil 360'; }
            var pg = document.getElementById('regerarProgress');
            if (pg) pg.remove();
        }
    }

    function showSaveIndicator() {

    // ===== STATUS =====
    function changeStatus(newStatus) {
        try {
            if (newStatus === 'aprovado') {
                var errors = validatePerfilForApproval();
                if (errors.length > 0) {
                    showValidationErrors(errors);
                    perfil.status = 'em_revisao';
                    savePerfil();
                    updateStatusBadge();
                    updateGenerateButton();
                    return;
                }
            }
            perfil.status = newStatus;
            savePerfil();
            updateStatusBadge();
            updateGenerateButton();
        } catch(e) {
            alert('Erro ao mudar status: ' + e.message);
            console.error(e);
        }
    }

    function validatePerfilForApproval() {
        var errors = [];
        var source = (perfil.perfil && perfil.perfil.resumoExecutivo) ? perfil.perfil : perfil;

        // Único bloqueio: resumo executivo deve existir
        if (!source.resumoExecutivo || !String(source.resumoExecutivo).trim()) {
            errors.push('Resumo Executivo está vazio — processe a consultoria primeiro.');
        }

        // Tudo abaixo é apenas informativo, não bloqueia
        if (false) { var nomePresent, idadeVal; // dead code block start
        if (!nomePresent && !idadeVal) {
            errors.push('Dados Extraídos: nem nome nem idade estão preenchidos');
        }
        // Warn for unfilled extracted fields (non-blocking - just informational)
        var criticalExtracted = ['profissao','cidade','nivel','foco'];
        var missingExtracted = [];
        criticalExtracted.forEach(function(fk) {
            var val = (deVal[fk] && deVal[fk].valor) || perfil[fk] || (perfil.perfil && perfil.perfil[fk]);
            if (!val) missingExtracted.push(fk);
        });
        // Missing extracted fields are informational only — do NOT block approval
        // if (missingExtracted.length > 0) { /* just a warning, not an error */ }
        } // close if(false)

        return errors;
    }

    function showValidationErrors(errors) {
        var list = document.getElementById('validationList');
        list.innerHTML = errors.map(function(e) { return '<li>' + esc(e) + '</li>'; }).join('');
        document.getElementById('validationModal').classList.add('show');
    }

    function fecharValidationModal() {
        document.getElementById('validationModal').classList.remove('show');
    }

    function getStatusLabel(s) {
        const map = { rascunho: 'Rascunho', em_revisao: 'Em Revisão', aprovado: 'Aprovado', material_publicado: 'Material Publicado' };
        return map[s] || s || 'Rascunho';

        const map = { rascunho: 'badge--draft', em_revisao: 'badge--review', aprovado: 'badge--approved', material_publicado: 'badge--published' };

    // ===== PRE-RENDER VALIDATION =====
    function preRenderValidation(data) {
        const warnings = [];
        const nome = data.dadosFormulario?.nome || data.nome || '';
        if (!nome) warnings.push('Nome do aluno não encontrado nos dados');

        const p = data.perfil || data;
        if (!p.resumoExecutivo) warnings.push('Resumo executivo ausente');
        if (!p.mapaPersonalidade || (Array.isArray(p.mapaPersonalidade) ? p.mapaPersonalidade.length < 7 : Object.keys(p.mapaPersonalidade).length < 7))
            warnings.push('Mapa de personalidade incompleto');

        if (warnings.length > 0) {
            console.warn('Perfil com problemas:', warnings);
            // Show a small warning banner at the top of the page
            var banner = document.createElement('div');
            banner.style.cssText = 'background:#fffbeb;border:1px solid #f59e0b;border-radius:8px;padding:12px 20px;margin:12px auto;max-width:900px;font-size:0.85rem;color:#92400e;line-height:1.6;';
            banner.innerHTML = '<strong>Avisos do perfil:</strong><ul style="margin:4px 0 0 16px;padding:0;">' +
                warnings.map(function(w) { return '<li>' + w + '</li>'; }).join('') + '</ul>';
            var header = document.getElementById('studentName');
            if (header && header.parentNode) {
                header.parentNode.appendChild(banner);
            }
        }
        return warnings;
    }

    // ===== UNIFIED FIELD HELPER =====
    function getField(key) {
        // Check all possible locations for a field value
        const de = (perfil.perfil && perfil.perfil.dadosExtraidos) || perfil.dadosExtraidos || {};
        const deVal = de[key] && de[key].valor;
        if (deVal !== undefined && deVal !== null && deVal !== '') return deVal;
        if (perfil.dadosFormulario && perfil.dadosFormulario[key]) return perfil.dadosFormulario[key];
        if (perfil[key] !== undefined && perfil[key] !== null && perfil[key] !== '') return perfil[key];
        if (perfil.perfil && perfil.perfil[key]) return perfil.perfil[key];
        return '';
    }

    // ===== RENDER =====
    function renderAll() {

        console.log('p.perfil exists:', !!p.perfil);
        if (p.perfil) console.log('p.perfil keys:', Object.keys(p.perfil));

        // Data normalization — handle nested vs flat structure
        var source = (p.perfil && p.perfil.resumoExecutivo) ? p.perfil : p;
        console.log('source resolved to:', source === p.perfil ? 'p.perfil' : 'p');

    function renderStatusBar(p) {
        const status = p.status || 'rascunho';

        if (p.eventoAlvo && p.eventoData) {
            const target = new Date(p.eventoData);

            '<option value="em_revisao"' + (status === 'em_revisao' ? ' selected' : '') + '>Em Revisão</option>' +
            '<option value="aprovado"' + (status === 'aprovado' ? ' selected' : '') + '>Aprovado</option>' +
            '<option value="material_publicado"' + (status === 'material_publicado' ? ' selected' : '') + '>Material Publicado</option>' +
            '</select>' +

            '<button class="btn btn--ghost btn--sm" onclick="regerarPerfil()" id="btnRegerar" style="margin-left:var(--space-sm);border-color:var(--warning);color:var(--warning);">Regerar Perfil 360</button>' +
            '<span class="save-indicator" id="saveIndicator">Salvo</span>' +
            countdownHtml +
            '</div>';
    }

    // ===== SEAL HELPER =====
    function sealToClass(s) {
        if (!s) return '';
        if (s === 'verde' || s.indexOf('\uD83D\uDFE2') !== -1) return 'seal-green';
        if (s === 'amarelo' || s.indexOf('\uD83D\uDFE1') !== -1) return 'seal-yellow';
        if (s === 'laranja' || s.indexOf('\uD83D\uDFE0') !== -1) return 'seal-orange';
        if (s === 'vermelho' || s.indexOf('\uD83D\uDD34') !== -1) return 'seal-red';
        return '';
    }

    // ===== DADOS EXTRAIDOS DA CONSULTORIA =====
    function renderDadosExtraidos(p) {
        // Merge: edições manuais (perfil.dadosExtraidos) sobrescrevem dados da IA (perfil.perfil.dadosExtraidos)
        const deAI = (p.perfil && p.perfil.dadosExtraidos) || {};
        const deManual = p.dadosExtraidos || {};
        const de = {};
        // Copiar dados da IA primeiro
        Object.keys(deAI).forEach(function(k) { de[k] = Object.assign({}, deAI[k]); });
        // Sobrescrever com edições manuais (onde _editado = true)
        Object.keys(deManual).forEach(function(k) {
            if (deManual[k] && deManual[k]._editado) {
                de[k] = Object.assign({}, de[k] || {}, deManual[k]);
            } else if (!de[k]) {
                de[k] = deManual[k];
            }
        });

        const fields = [
            { key: 'idade', label: 'Idade', type: 'number', legacyKey: 'idade' },
            { key: 'profissao', label: 'Profissão', type: 'text', legacyKey: 'profissao' },
            { key: 'cidade', label: 'Cidade', type: 'text', legacyKey: 'cidade' },
            { key: 'nivel', label: 'Nível de Inglês', type: 'select', legacyKey: 'nivel', options: ['A0 (Beginner Absoluto)','A1 (Iniciante)','A2 (Pré-Intermediário)','B1 (Intermediário)','B2 (Intermediário Superior)','C1 (Avançado)','C1+ (Avançado Plus)','C2 (Proficiente)'] },
            { key: 'foco', label: 'Foco do Curso', type: 'select', legacyKey: 'foco', options: ['Travel English','Business English','Conversação','Proficiência','Apresentações','Acadêmico','Outros'] },
            { key: 'historico', label: 'Histórico com Inglês', type: 'textarea', legacyKey: 'historico' },
            { key: 'eventoAlvo', label: 'Evento-Alvo', type: 'evento', legacyKey: 'eventoAlvo' },
            { key: 'hobbies', label: 'Hobbies e Interesses', type: 'textarea', legacyKey: 'hobbies' },
            { key: 'stakeAutomatico', label: 'Stake Automático', type: 'textarea', legacyKey: 'stakeAutomatico' },
            { key: 'vitoriaAutomatica', label: 'Vitória Automática', type: 'textarea', legacyKey: 'vitoriaAutomatica' }
        ];

        let cardsHtml = '';
        fields.forEach(function(f) {
            const data = de[f.key] || {};
            let valor = data.valor !== undefined && data.valor !== null ? data.valor : (getField(f.legacyKey) || '');
            const selo = data.selo || '';
            const evidencia = data.evidencia || '';
            const encontrado = data.encontrado !== false && (valor !== '' && valor !== null);
            const editado = data._editado || false;

            // For stakeAutomatico/vitoriaAutomatica, valor might be object with .texto
            if (f.key === 'stakeAutomatico' || f.key === 'vitoriaAutomatica') {
                if (typeof valor === 'object' && valor !== null) valor = valor.texto || '';
            }

            const notFoundClass = !encontrado ? ' not-found' : '';
            const sealClass = sealToClass(selo);

            let inputHtml = '';
            const inputId = 'extracted-' + f.key;
            const onChangeAttr = 'onchange="updateExtractedField(\'' + f.key + '\', this.value)"';
            const onInputAttr = 'oninput="updateExtractedField(\'' + f.key + '\', this.value)"';

            if (f.type === 'number') {
                inputHtml = '<input type="number" id="' + inputId + '" value="' + esc(String(valor || '')) + '" ' + onInputAttr + '>';
            } else if (f.type === 'text') {
                inputHtml = '<input type="text" id="' + inputId + '" value="' + esc(String(valor || '')) + '" ' + onInputAttr + '>';
            } else if (f.type === 'textarea') {
                inputHtml = '<textarea id="' + inputId + '" ' + onInputAttr + '>' + esc(String(valor || '')) + '</textarea>';
            } else if (f.type === 'select') {
                inputHtml = '<select id="' + inputId + '" ' + onChangeAttr + '>';
                inputHtml += '<option value="">— Selecione —</option>';
                var valorStr = String(valor || '').toLowerCase();
                f.options.forEach(function(opt) {
                    var isMatch = (String(valor) === opt) || (valorStr && (opt.toLowerCase().indexOf(valorStr) !== -1 || valorStr.indexOf(opt.toLowerCase()) !== -1));
                    inputHtml += '<option value="' + esc(opt) + '"' + (isMatch ? ' selected' : '') + '>' + esc(opt) + '</option>';
                });
                inputHtml += '</select>';
            } else if (f.type === 'evento') {
                // eventoAlvo can be object with tipo/data/local/stake/vitoria or string
                if (typeof valor === 'object' && valor !== null) {
                    inputHtml = '<div style="display:flex;flex-direction:column;gap:var(--space-xs);">' +
                        '<input type="text" placeholder="Tipo do evento" value="' + esc(valor.tipo || '') + '" oninput="updateExtractedEventoField(\'tipo\', this.value)">' +
                        '<input type="text" placeholder="Data" value="' + esc(valor.data || '') + '" oninput="updateExtractedEventoField(\'data\', this.value)">' +
                        '<input type="text" placeholder="Local" value="' + esc(valor.local || '') + '" oninput="updateExtractedEventoField(\'local\', this.value)">' +
                        '<input type="text" placeholder="Stake" value="' + esc(valor.stake || '') + '" oninput="updateExtractedEventoField(\'stake\', this.value)">' +
                        '<input type="text" placeholder="Vitória" value="' + esc(valor.vitoria || '') + '" oninput="updateExtractedEventoField(\'vitoria\', this.value)">' +
                        '</div>';
                } else {
                    inputHtml = '<input type="text" id="' + inputId + '" value="' + esc(String(valor || '')) + '" ' + onInputAttr + '>';
                }
            }

            cardsHtml += '<div class="extracted-field' + notFoundClass + '">' +
                '<div class="extracted-field__header">' +
                '<span class="extracted-field__label">' + esc(f.label) + '</span>' +
                (sealClass ? '<span class="extracted-field__seal ' + sealClass + '"></span>' : '') +
                (editado ? '<span class="extracted-field__edited">Editado</span>' : '') +
                '</div>' +
                inputHtml +
                (!encontrado ? '<div class="extracted-field__notfound">Não encontrado na consultoria \u2014 preencha manualmente</div>' : '') +
                (evidencia ? '<div class="extracted-field__evidence" style="font:var(--text-micro,0.7rem/1.4 inherit);color:var(--text-dim);font-style:italic;margin-top:var(--space-xs);display:flex;align-items:flex-start;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/></svg><span><strong>Evidência: </strong>\u201C' + esc(evidencia) + '\u201D</span></div>' : '') +
                '</div>';
        });

        return '<div style="margin-bottom:var(--space-xl);">' +
            '<div class="extracted-section-card">' +
            '<div class="section-tag">Dados Extraídos</div>' +
            '<h2 class="h2" style="margin-bottom:var(--space-sm);">Dados Extraídos da Consultoria</h2>' +
            '<p class="text-muted" style="margin-bottom:var(--space-md);">Campos extraídos automaticamente pela IA. Edite conforme necessário.</p>' +
            '<div class="extracted-grid">' + cardsHtml + '</div>' +
            '</div></div>';
    }

    function updateExtractedField(key, value) {
        // Ensure dadosExtraidos exists at root level (where manual edits live)
        if (!perfil.dadosExtraidos) perfil.dadosExtraidos = {};

        // Preserve existing AI data (selo, evidencia) if available
        var aiData = {};
        if (perfil.perfil && perfil.perfil.dadosExtraidos && perfil.perfil.dadosExtraidos[key]) {
            aiData = perfil.perfil.dadosExtraidos[key];
        }
        if (!perfil.dadosExtraidos[key]) {
            perfil.dadosExtraidos[key] = {
                valor: null,
                selo: aiData.selo || '',
                evidencia: aiData.evidencia || '',
                encontrado: aiData.encontrado !== false
            };
        }

        // For stakeAutomatico/vitoriaAutomatica store as texto
        if (key === 'stakeAutomatico' || key === 'vitoriaAutomatica') {
            if (typeof perfil.dadosExtraidos[key].valor !== 'object' || perfil.dadosExtraidos[key].valor === null) {
                perfil.dadosExtraidos[key].valor = { texto: value };
            } else {
                perfil.dadosExtraidos[key].valor.texto = value;
            }
        } else {
            perfil.dadosExtraidos[key].valor = value;
        }

        perfil.dadosExtraidos[key]._editado = true;
        perfil.dadosExtraidos[key].encontrado = true;

        // Also write to legacy fields for backward compatibility
        if (key === 'idade' || key === 'profissao' || key === 'cidade' || key === 'nivel' || key === 'foco') {
            perfil[key] = value;
        }

        // Save immediately for critical fields (not just autoSave with delay)
        savePerfil();
    }

    function updateExtractedEventoField(subfield, value) {
        if (!perfil.dadosExtraidos) perfil.dadosExtraidos = {};
        if (!perfil.dadosExtraidos.eventoAlvo) {
            perfil.dadosExtraidos.eventoAlvo = { valor: {}, selo: '', evidencia: '', encontrado: true };
        }
        if (typeof perfil.dadosExtraidos.eventoAlvo.valor !== 'object' || perfil.dadosExtraidos.eventoAlvo.valor === null) {
            perfil.dadosExtraidos.eventoAlvo.valor = {};
        }
        perfil.dadosExtraidos.eventoAlvo.valor[subfield] = value;
        perfil.dadosExtraidos.eventoAlvo._editado = true;
        perfil.dadosExtraidos.eventoAlvo.encontrado = true;

        // Sync legacy eventoAlvo/eventoData
        if (subfield === 'tipo') perfil.eventoAlvo = value;
        if (subfield === 'data') perfil.eventoData = value;

        autoSave();
    }

    function renderResumoExecutivo(p) {
        const resumo = p.resumoExecutivo || '';
        const frases = p.frasesTextuais || [];

        let frasesHtml = '';
        frases.forEach(function(f, i) {
            frasesHtml += '<div class="frase-item">' +
                '<div class="frase-quote"><span class="editable" contenteditable="true" data-field="frasesTextuais.' + i + '.frase" oninput="updateNestedField(this)">' + esc(f.frase || f.texto || '') + '</span></div>' +
                '<div class="frase-meta">' +
                '<span>Uso: <span class="editable" contenteditable="true" data-field="frasesTextuais.' + i + '.uso" oninput="updateNestedField(this)" style="display:inline">' + esc(f.uso || '') + '</span></span>' +
                '<span>Contexto: <span class="editable" contenteditable="true" data-field="frasesTextuais.' + i + '.contexto" oninput="updateNestedField(this)" style="display:inline">' + esc(f.contexto || '') + '</span></span>' +
                '</div></div>';
        });

        if (frases.length === 0) {
            frasesHtml = '<p class="text-dim" style="font-style:italic;">Nenhuma frase textual capturada ainda.</p>';
        }

        return '<div style="margin-bottom:var(--space-2xl);">' +
            '<div class="section-tag">Seção 1</div>' +
            '<h2 class="h2">Resumo Executivo</h2>' +
            '<div class="card card--bordered-left" style="margin-top:var(--space-md);">' +
            '<div class="editable editable-p" contenteditable="true" data-field="resumoExecutivo" oninput="updateField(this)">' + esc(resumo) + '</div>' +
            '</div>' +
            '<h3 class="h2" style="margin:var(--space-lg) 0 var(--space-md);">Frases Textuais Capturadas</h3>' +
            frasesHtml +
            '</div>';
    }

    function renderMapaPersonalidade(p) {
        const mp = p.mapaPersonalidade || {};
        // Convert object to array (API returns {introversaoExtroversao: {...}, ...})
        const eixos = Array.isArray(mp) ? mp : Object.entries(mp).map(function(entry) {
            var obj = entry[1] || {};
            obj._key = entry[0];
            // Add human-readable name from schema if available
            var labels = {
                introversaoExtroversao: 'Introversão ↔ Extroversão',
                seriedadeLudicidade: 'Sério ↔ Brincalhão',
                reflexivoImpulsivo: 'Reflexivo ↔ Impulsivo',
                confianteInseguro: 'Confiante ↔ Inseguro com idioma',
                toleranciaErro: 'Tolerância ao Erro',
                estiloAprendizagem: 'Estilo de Aprendizagem',
                energiaPreferida: 'Energia Preferida em Aula'
            };
            if (!obj.nome) obj.nome = labels[entry[0]] || entry[0];
            return obj;
        });
        if (eixos.length === 0) {
            return '<div style="margin-bottom:var(--space-2xl);">' +
                '<div class="section-tag">Seção 2</div>' +
                '<h2 class="h2">Mapa de Personalidade</h2>' +
                '<p class="text-dim">Nenhum eixo de personalidade definido.</p>' +
                '</div>';
        }

        let cards = '';
        eixos.forEach(function(eixo, i) {
            const val = eixo.valor || 5;
            const pct = val * 10;
            const barClass = val <= 2 ? 'low' : val <= 4 ? 'mid-low' : val <= 6 ? 'mid' : val <= 8 ? 'mid-high' : 'high';
            var s = eixo.selo || '';
            const sealClass = (s === 'verde' || s === '🟢') ? 'seal-green' : (s === 'amarelo' || s === '🟡') ? 'seal-yellow' : (s === 'laranja' || s === '🟠') ? 'seal-orange' : 'seal-red';
            const sealColor = (s === 'verde' || s === '🟢') ? 'var(--success)' : (s === 'amarelo' || s === '🟡') ? 'var(--warning)' : (s === 'laranja' || s === '🟠') ? '#c2410c' : 'var(--error)';
            const sealEmoji = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + sealColor + ';vertical-align:middle;margin-right:4px;"></span>';

            let evidencesHtml = '';
            if (eixo.evidencias && eixo.evidencias.length > 0) {
                evidencesHtml = '<ul class="eixo-evidences" id="evidences-' + i + '">';
                eixo.evidencias.forEach(function(ev) {
                    evidencesHtml += '<li>' + esc(ev) + '</li>';
                });
                evidencesHtml += '</ul>';
            }

            cards += '<div class="eixo-card">' +
                '<div class="eixo-header">' +
                '<span class="eixo-name">' + esc(eixo.nome || 'Eixo ' + (i + 1)) + '</span>' +
                '<div class="eixo-badges">' +
                '<span class="eixo-seal ' + sealClass + '">' + sealEmoji + ' ' + esc(eixo.selo || '') + '</span>' +
                '<span class="eixo-confidence">' + (eixo.confianca || 0) + '% confiança</span>' +
                '</div></div>' +
                '<div class="eixo-labels"><span>' + esc(eixo.labelEsquerda || '1') + '</span><span class="eixo-val-center">' + val + '/10</span><span>' + esc(eixo.labelDireita || '10') + '</span></div>' +
                '<div class="eixo-bar-container"><div class="eixo-bar-fill ' + barClass + '" style="width:' + pct + '%"></div></div>' +
                '<div class="eixo-inference">' + esc(eixo.inferencia || '') + '</div>' +
                evidencesHtml +
                '<div class="eixo-actions">' +
                (eixo.evidencias && eixo.evidencias.length > 0 ? '<button class="btn btn--ghost btn--sm" onclick="toggleEvidences(' + i + ')">Ver evidências</button>' : '') +
                '<button class="btn btn--ghost btn--sm" onclick="ajustarEixo(' + i + ')">Discordo, ajustar</button>' +
                '</div>' +
                '<div class="ajuste-input" id="ajuste-' + i + '">' +
                '<input type="range" min="1" max="10" value="' + val + '" oninput="previewAjuste(' + i + ',this.value)" onchange="confirmarAjuste(' + i + ',this.value)">' +
                '<span id="ajuste-val-' + i + '">' + val + '</span>' +
                '</div>' +
                '</div>';
        });

        // Check for missing required axes
        var requiredAxesMap = [
            { key: 'introversaoExtroversao', label: 'Introversão/Extroversão' },
            { key: 'seriedadeLudicidade', label: 'Seriedade/Ludicidade' },
            { key: 'reflexivoImpulsivo', label: 'Reflexivo/Impulsivo' },
            { key: 'confianteInseguro', label: 'Confiante/Inseguro' },
            { key: 'toleranciaErro', label: 'Tolerância ao Erro' },
            { key: 'estiloAprendizagem', label: 'Estilo de Aprendizagem' },
            { key: 'energiaPreferida', label: 'Energia Preferida' }
        ];
        var presentKeys = eixos.map(function(e) { return e._key || e.chave || ''; });
        var missingAxes = requiredAxesMap.filter(function(req) { return presentKeys.indexOf(req.key) === -1; });
        var axesWarning = '';
        if (missingAxes.length > 0) {
            var missingLabels = missingAxes.map(function(m) { return m.label; }).join(', ');
            axesWarning = '<div class="axes-warning"><strong>Atenção:</strong> O mapa de personalidade tem apenas ' + eixos.length + ' de 7 eixos obrigatórios. Os eixos faltantes são: ' + missingLabels + '. Adicione-os manualmente ou reprocesse a consultoria.</div>';
        }

        return '<div style="margin-bottom:var(--space-2xl);">' +
            '<div class="section-tag">Seção 2</div>' +
            '<h2 style="font-family:\'Cormorant Garamond\',Georgia,serif;font-size:28px;font-weight:600;color:#1a1a1a;margin-bottom:4px;">Mapa de Personalidade</h2>' +
            '<p style="font-family:-apple-system,BlinkMacSystemFont,\'Inter\',sans-serif;font-size:13px;color:#9ca3af;margin-bottom:20px;">7 eixos comportamentais inferidos da consultoria — clique "Ver evidências" para ver as frases que sustentam cada pontuação</p>' +
            cards +
            axesWarning +
            '</div>';
    }

    function renderForcas(p) {
        const forcas = p.forcas || [];
        const melhorias = p.melhorias || [];

        function renderList(items, type) {
            if (items.length === 0) return '<li class="text-dim" style="font-style:italic;">Nenhum item.</li>';
            return items.map(function(item, i) {
                var is = item.selo || '';
                const sealClass = (is === 'verde' || is === '🟢') ? 'seal-green' : (is === 'amarelo' || is === '🟡') ? 'seal-yellow' : (is === 'laranja' || is === '🟠') ? 'seal-orange' : 'seal-red';
                return '<li>' +
                    '<span class="editable" contenteditable="true" data-field="' + type + '.' + i + '.texto" oninput="updateNestedField(this)" style="display:inline">' + esc(item.texto || '') + '</span>' +
                    (item.selo ? ' <span class="sw-seal ' + sealClass + '">' + esc(item.selo) + '</span>' : '') +
                    (item.evidencia ? '<span class="sw-evidence">' + esc(item.evidencia) + '</span>' : '') +
                    '</li>';
            }).join('');
        }

        return '<div style="margin-bottom:var(--space-2xl);">' +
            '<div class="section-tag">Seção 3</div>' +
            '<h2 class="h2">Forças e Pontos de Melhoria</h2>' +
            '<div class="grid-2" style="margin-top:var(--space-md);">' +
            '<div class="sw-card strengths"><div class="sw-header"><div class="sw-dot"></div>Forças</div><ul>' + renderList(forcas, 'forcas') + '</ul></div>' +
            '<div class="sw-card weaknesses"><div class="sw-header"><div class="sw-dot"></div>Pontos de Melhoria</div><ul>' + renderList(melhorias, 'melhorias') + '</ul></div>' +
            '</div></div>';
    }

    function renderNecessidades(p) {
        const n = p.necessidadesPedagogicas || {};
        const fields = [
            { key: 'adaptacaoNivel', altKey: 'adequacaoNivel', label: 'Adequação por Nível' },
            { key: 'adaptacaoIdade', altKey: 'adequacaoIdade', label: 'Adequação por Idade' },
            { key: 'estiloAprendizagem', label: 'Estilo de Aprendizagem' },
            { key: 'toleranciaTraducao', label: 'Tolerância a Tradução' },
            { key: 'ritmoIdeal', label: 'Ritmo Ideal' },
            { key: 'tiposExercicio', label: 'Tipos de Exercício Preferíveis' },
            { key: 'midiasApropriadas', label: 'Mídias Apropriadas' },
            { key: 'adaptacaoModalidade', label: 'Adaptação à Modalidade' }
        ];

        let cards = '';
        fields.forEach(function(f) {
            cards += '<div class="info-card">' +
                '<div class="info-label">' + f.label + '</div>' +
                '<div class="info-value"><span class="editable" contenteditable="true" data-field="necessidadesPedagogicas.' + f.key + '" oninput="updateNestedField(this)" style="display:inline">' + esc(n[f.key] || (f.altKey && n[f.altKey]) || 'Não definido') + '</span></div>' +
                '</div>';
        });

        return '<div style="margin-bottom:var(--space-2xl);">' +
            '<div class="section-tag">Seção 4</div>' +
            '<h2 class="h2">Necessidades Pedagógicas</h2>' +
            '<div class="grid-2" style="margin-top:var(--space-md);">' + cards + '</div>' +
            '</div>';
    }

                justificativas += '<li>' + esc(j) + '</li>';

            '<h4>Perfil do Professor Ideal</h4>' +

            '<textarea class="textarea edit-area" data-field="indicacaoProfessor.perfilIdeal" oninput="updateTextareaField(this)" placeholder="Descreva o perfil ideal do professor para este aluno...">' + esc(prof.perfilIdeal || prof.descricao || '') + '</textarea>' +

            '<h2 class="h2">Justificativa do Programa</h2>' +
            '<div class="card card--bordered-left" style="margin-top:var(--space-md);">' +
            '<div class="editable editable-p" contenteditable="true" data-field="justificativaPrograma" oninput="updateField(this)">' + esc(p.justificativaPrograma || '') + '</div>' +
            '</div></div>';
    }

    function atualizarNumAulas(val) {
        var num = parseInt(val);
        if (isNaN(num) || num < 1) return;
        // Update in dadosFormulario
        if (!perfil.dadosFormulario) perfil.dadosFormulario = {};
        perfil.dadosFormulario.numAulas = num;
        // Also sync to the generation input if it exists
        var genInput = document.getElementById('geracaoNumAulas');
        if (genInput) genInput.value = num;

    // ===== BLOCOS DE TEMAS (Regra 121) =====
    function getBlocosState(numAulas) {
        var n = parseInt(numAulas) || 0;
        if (n <= 0) return { totalBlocos: 0, blocos: [] };
        var tam = 5;
        var totalBlocos = Math.ceil(n / tam);
        if (!perfil.blocosGeracoes) perfil.blocosGeracoes = [];

        // Auto-recovery: se bloco ficou em "em_geracao" há mais de 5 min, resetar para "disponivel"
        var agora = Date.now();
        var dirty = false;
        perfil.blocosGeracoes.forEach(function(blk) {
            if (blk && blk.status === 'em_geracao') {
                var inicio = blk._geracaoInicio ? new Date(blk._geracaoInicio).getTime() : 0;
                if (agora - inicio > 5 * 60 * 1000) {
                    blk.status = 'disponivel';
                    dirty = true;
                }
            }
        });
        if (dirty) savePerfil();

        var blocos = [];
        for (var i = 0; i < totalBlocos; i++) {
            var inicio = i * tam + 1;
            var fim = Math.min((i + 1) * tam, n);
            var existing = perfil.blocosGeracoes[i] || {};
            var status = existing.status || (i === 0 ? 'disponivel' : 'bloqueado');
            // Unlock next block if previous is done
            if (i > 0 && perfil.blocosGeracoes[i - 1] && perfil.blocosGeracoes[i - 1].status === 'gerado' && status === 'bloqueado') {
                status = 'disponivel';
            }
            blocos.push({
                numero: i + 1,
                aulaInicio: inicio,
                aulaFim: fim,
                status: existing.status || status,
                geradoEm: existing.geradoEm || null,
                temas: existing.temas || []
            });
        }
        return { totalBlocos: totalBlocos, blocos: blocos };
    }

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: formObj.nome || perfil.nome || perfilId,
                    foco: foco,
                    nivel: nivel,
                    numAulas: numAulas,
                    bloco: num,
                    aulaInicio: inicio,
                    aulaFim: fim,
                    temasAnteriores: temasAnteriores,
                    profissao: getField('profissao') || formObj.profissao || '',
                    cidade: getField('cidade') || formObj.cidade || '',
                    idade: getField('idade') || formObj.idade || '',
                    vitoria: formObj.vitoria || (source.vitoriaAutomatica || {}).texto || '',
                    historico: getField('historico') || formObj.historicoIngles || '',
                    forcas: forcasArr.join('; '),
                    fraquezas: fraquezasArr.join('; '),
                    resumo: source.resumoExecutivo || '',
                    hobbies: hobbiesArr.join('; '),
                    modalidade: getField('modalidadeAula') || formObj.modalidadeAula || formObj.modalidade || 'Online'
                })
            });

            bTimers.forEach(function(t) { clearTimeout(t); });

            if (!resp.ok) throw new Error('API retornou ' + resp.status);
            var result = await resp.json();

            bProg(100, 'Bloco ' + num + ' gerado!');

            // Salvar bloco
            perfil.blocosGeracoes[num - 1] = {
                numero: num,
                aulaInicio: inicio,
                aulaFim: fim,
                status: 'gerado',
                geradoEm: new Date().toISOString(),
                temas: result.curriculo || []
            };

            // Desbloquear próximo bloco
            var totalBlocos = Math.ceil(numAulas / tam);
            if (num < totalBlocos) {
                if (!perfil.blocosGeracoes[num]) perfil.blocosGeracoes[num] = {};
                if (perfil.blocosGeracoes[num].status !== 'gerado') {
                    perfil.blocosGeracoes[num].status = 'disponivel';
                    perfil.blocosGeracoes[num].aulaInicio = num * tam + 1;
                    perfil.blocosGeracoes[num].aulaFim = Math.min((num + 1) * tam, numAulas);
                }
            }

            // Também atualizar perfil.curriculo (merge todos os blocos)
            var allTemas = [];
            perfil.blocosGeracoes.forEach(function(blk) {
                if (blk && blk.temas) allTemas = allTemas.concat(blk.temas);
            });
            perfil.curriculo = allTemas;
            perfil.temasAulas = allTemas.map(function(a) {
                return 'Aula ' + a.aula + ': ' + a.tema + ' — ' + a.focoLinguistico;
            }).join('\n');

            savePerfil();
            setTimeout(renderAll, 500);

        } catch (e) {
            bTimers.forEach(function(t) { clearTimeout(t); });
            perfil.blocosGeracoes[num - 1].status = 'erro';
            perfil.blocosGeracoes[num - 1].erro = e.message;
            savePerfil();
            renderAll();

            // Popup de erro
            var popup = document.createElement('div');
            popup.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;';
            popup.innerHTML = '<div style="background:#fff;border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);text-align:center;">' +
                '<div style="width:48px;height:48px;background:#FEF2F2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>' +
                '<h3 style="font-family:\'Cormorant Garamond\',Georgia,serif;font-size:22px;font-weight:600;margin-bottom:8px;">Erro ao gerar Bloco ' + num + '</h3>' +
                '<p style="font-family:-apple-system,BlinkMacSystemFont,\'Inter\',sans-serif;font-size:14px;line-height:1.6;color:#6b7280;margin-bottom:24px;">' + esc(e.message || 'Erro desconhecido') + '</p>' +
                '<div style="display:flex;gap:12px;justify-content:center;">' +
                '<button onclick="this.closest(\'div[style*=fixed]\').remove();gerarBloco(' + num + ')" style="padding:12px 28px;background:#003080;color:#fff;border:none;border-radius:12px;font-family:-apple-system,BlinkMacSystemFont,\'Inter\',sans-serif;font-size:14px;font-weight:600;cursor:pointer;">Tentar Novamente</button>' +
                '<button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:12px 28px;background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:12px;font-family:-apple-system,BlinkMacSystemFont,\'Inter\',sans-serif;font-size:14px;font-weight:500;cursor:pointer;">Fechar</button>' +
                '</div></div>';
            document.body.appendChild(popup);
        }
    }

    function setNestedValue(obj, path, value) {
        const keys = path.split('.');
        let current = obj;
        for (let i = 0; i < keys.length - 1; i++) {
            const key = isNaN(keys[i]) ? keys[i] : parseInt(keys[i]);
            if (current[key] === undefined || current[key] === null) {
                current[key] = isNaN(keys[i + 1]) ? {} : [];
            }
            current = current[key];
        }
        const lastKey = isNaN(keys[keys.length - 1]) ? keys[keys.length - 1] : parseInt(keys[keys.length - 1]);
        current[lastKey] = value;
    }

    function getNestedValue(obj, path) {
        const keys = path.split('.');
        let current = obj;
        for (let i = 0; i < keys.length; i++) {
            if (current === undefined || current === null) return undefined;
            const key = isNaN(keys[i]) ? keys[i] : parseInt(keys[i]);
            current = current[key];
        }
        return current;
    }

        crypto.getRandomValues(arr);
        return Array.from(arr, function(b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    // ===== PROMPT GENERATION =====
    function gerarPromptBloco(num) {
        var blocoData = perfil.blocosGeracoes && perfil.blocosGeracoes[num - 1];
        if (!blocoData || blocoData.status !== 'gerado' || !blocoData.temas || blocoData.temas.length === 0) {
            alert('Bloco ' + num + ' ainda não foi gerado. Gere os temas primeiro.');
            return;
        }

        // Verificar status aprovado
        var source = (perfil.perfil && perfil.perfil.resumoExecutivo) ? perfil.perfil : perfil;
        var isAprovado = perfil.status === 'aprovado' || source.status === 'aprovado';
        if (!isAprovado) {
            alert('Mude o status para "Aprovado" antes de gerar o prompt.');
            return;
        }

        // Coletar temas de blocos anteriores (para contexto de continuidade)
        var temasAnteriores = [];
        if (num > 1 && perfil.blocosGeracoes) {
            for (var i = 0; i < num - 1; i++) {
                if (perfil.blocosGeracoes[i] && perfil.blocosGeracoes[i].temas) {
                    temasAnteriores = temasAnteriores.concat(perfil.blocosGeracoes[i].temas);
                }
            }
        }

        // Substituir temasAulas temporariamente para o prompt
        var originalTemas = perfil.temasAulas;
        var originalCurriculo = perfil.curriculo;
        perfil.temasAulas = blocoData.temas.map(function(a) {
            return 'Aula ' + a.aula + ': ' + a.tema + ' — ' + a.focoLinguistico;
        }).join('\n');
        perfil.curriculo = blocoData.temas;

        // Gerar prompt base usando a função existente (vai usar os temas do bloco)
        // Salvar em window para captura
        window._blocoPromptNum = num;
        window._blocoTemasAnteriores = temasAnteriores;
        window._blocoAulaInicio = blocoData.aulaInicio;
        window._blocoAulaFim = blocoData.aulaFim;

        try {
            gerarPrompt();
        } finally {
            // Restaurar
            perfil.temasAulas = originalTemas;
            perfil.curriculo = originalCurriculo;
            window._blocoPromptNum = null;
            window._blocoTemasAnteriores = null;
        }
    }

    function gerarPrompt() {
        // Read and save temas de aulas
        var temasEl = document.getElementById('temasAulas');
        if (temasEl && temasEl.value.trim()) {
            perfil.temasAulas = temasEl.value.trim();
            window._temasAulas = temasEl.value.trim().split('\n').filter(function(l) { return l.trim(); });
            savePerfil();
        } else {
            window._temasAulas = null;
        }

        // Validate temas are filled — skip if curriculo exists
        var temasVal = temasEl ? temasEl.value.trim() : (perfil.temasAulas || '');
        var hasCurriculo = perfil.curriculo && perfil.curriculo.length > 0;
        if (!temasVal && !hasCurriculo) {
            // Show inline error instead of alert (alerts can be blocked)
            var temasCard = document.querySelector('.generate-section');
            if (temasCard) {
                var existing = temasCard.querySelector('.temas-error');
                if (existing) existing.remove();
                var errDiv = document.createElement('div');
                errDiv.className = 'temas-error';
                errDiv.style.cssText = 'background:var(--error-bg);border:1px solid var(--error-border);color:var(--error);padding:12px 16px;border-radius:8px;margin-bottom:12px;font:500 0.9rem/1.5 var(--font-body);';
                errDiv.textContent = 'Preencha os Temas por Aula antes de gerar o prompt. Clique "Gerar Temas com IA" ou preencha manualmente.';
                temasCard.insertBefore(errDiv, temasCard.firstChild);
                errDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            if (temasEl) temasEl.focus();
            return;
        }

        // Normalize: AI data in perfil.perfil, form data in perfil.dadosFormulario
        const source = (perfil.perfil && perfil.perfil.resumoExecutivo) ? perfil.perfil : perfil;
        const formObj = perfil.dadosFormulario || {};
        const nome = formObj.nome || perfil.nome || perfilId;

        // PRIORITY: form fields edited by manager override AI-extracted values
        // This ensures that if Helen changes nivel from A1 to A2, the prompt uses A2
        function getManagedField(key) {
            // 1st: check _geracao* values (set by Sincronizar or gerarBloco)
            if (key === 'nivel' && perfil._geracaoNivel) return perfil._geracaoNivel;
            if (key === 'foco' && perfil._geracaoFoco) return perfil._geracaoFoco;
            if (key === 'numAulas' && perfil._geracaoNumAulas) return perfil._geracaoNumAulas;

            // 2nd: check MANUAL edits (perfil.dadosExtraidos — root level, where updateExtractedField saves)
            var deManual = perfil.dadosExtraidos || {};
            if (deManual[key] && deManual[key]._editado && deManual[key].valor !== undefined && deManual[key].valor !== null && deManual[key].valor !== '') {
                return deManual[key].valor;
            }

            // 3rd: check AI-generated data (perfil.perfil.dadosExtraidos)
            var deAI = (perfil.perfil && perfil.perfil.dadosExtraidos) || {};
            var deVal = deAI[key] && deAI[key].valor;
            if (deVal !== undefined && deVal !== null && deVal !== '') return deVal;

            // 4th: check dadosFormulario
            var formVal = formObj[key];
            if (formVal !== undefined && formVal !== null && formVal !== '') return formVal;

            // 5th: fallback to source
            if (source[key]) return source[key];
            return '';
        }

        // Extract concise stake/vitória — if raw field is too long (>200 chars),
        // derive from resumo executivo or promessa transformadora instead
        function getConcisoStake() {
            var raw = formObj.stake || (source.stakeAutomatico || {}).texto || '';
            if (raw.length <= 200) return raw;
            // Extract from promessa transformadora: "De 'X' a 'Y'" — the "De" part is the stake
            var promessa = source.promessaTransformadora || '';
            var deMatch = promessa.match(/[Dd]e\s+[''""](.+?)[''""](?:\s+a\s)/);
            if (deMatch) return deMatch[1];
            // Extract from personagem-jornada: the "de" field
            var pj = source.personagemJornada || {};
            if (pj.de && pj.de.length <= 200) return pj.de;
            // Last resort: first sentence of resumo
            var resumo = source.resumoExecutivo || '';
            var firstSentence = resumo.split(/[.!?]/)[0];
            if (firstSentence && firstSentence.length <= 200) return 'Risco: ' + firstSentence.trim();
            return raw.substring(0, 200) + '...';
        }

        function getConcisoVitoria() {
            var raw = formObj.vitoria || (source.vitoriaAutomatica || {}).texto || '';
            if (raw.length <= 200) return raw;
            // Extract from promessa transformadora: "De 'X' a 'Y'" — the "a 'Y'" part is the vitória
            var promessa = source.promessaTransformadora || '';
            var paraMatch = promessa.match(/a\s+[''""](.+?)[''""](?:\s+[—–-]|\s*$)/);
            if (paraMatch) return paraMatch[1];
            // Extract from personagem-jornada: the "para" field
            var pj = source.personagemJornada || {};
            if (pj.para && pj.para.length <= 200) return pj.para;
            // Last resort: justificativa first sentence
            var just = source.justificativaPrograma || '';
            var firstS = just.split(/[.!?]/)[0];
            if (firstS && firstS.length <= 200) return firstS.trim();
            return raw.substring(0, 200) + '...';
        }

        var stakeText = getConcisoStake();
        var vitoriaText = getConcisoVitoria();

        // Build personality map text
        let mapaText = '';
        const mp = source.mapaPersonalidade || {};
        const eixosList = Array.isArray(mp) ? mp : Object.entries(mp).map(function(e) {
            var obj = e[1] || {};
            var labels = { introversaoExtroversao:'Introversão/Extroversão', seriedadeLudicidade:'Sério/Brincalhão', reflexivoImpulsivo:'Reflexivo/Impulsivo', confianteInseguro:'Confiante/Inseguro', toleranciaErro:'Tolerância ao Erro', estiloAprendizagem:'Estilo de Aprendizagem', energiaPreferida:'Energia Preferida' };
            obj.nome = obj.nome || labels[e[0]] || e[0];
            return obj;
        });
        eixosList.forEach(function(eixo) {
            mapaText += '- ' + (eixo.nome || 'Eixo') + ': ' + (eixo.valor || '?') + '/10 (' + (eixo.inferencia || '') + ') [Confiança: ' + (eixo.confianca || 0) + '%, Selo: ' + (eixo.selo || '?') + ']\n';
        });

        // Build frases
        let frasesText = '';
        (source.frasesTextuais || []).forEach(function(f) {
            frasesText += '- "' + (f.frase || f.texto || '') + '" \u2014 Uso: ' + (f.uso || '') + ' | Contexto: ' + (f.contexto || '') + '\n';
        });

    function copiarPrompt() {
        const text = document.getElementById('promptText').value;
        navigator.clipboard.writeText(text).then(function() {
            const btn = document.getElementById('copyPromptBtn');
            btn.textContent = 'Copiado!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = 'Copiar Prompt';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    function fecharModal() {
        document.getElementById('promptModal').classList.remove('show');
