<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni — Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/lib/supabase-config.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #003080;
            --navy-light: #004bb5;
            --red: #d70c0c;
            --bg: #f5f5f0;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-mid: #4a4a5a;
            --text-dim: #6b6b7b;
            --border: #e0e0d8;
            --success: #16a34a;
            --success-bg: rgba(22,163,74,0.08);
            --warn: #d97706;
            --warn-bg: rgba(217,119,6,0.08);
            --danger: #dc2626;
            --danger-bg: rgba(220,38,38,0.08);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* === HEADER === */
        .header {
            background: var(--navy);
            color: #fff;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header-logo {
            height: 32px;
            filter: brightness(0) invert(1);
        }
        .header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.7);
        }
        .refresh-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .refresh-btn:hover { background: rgba(255,255,255,0.2); }
        .refresh-btn:focus-visible { outline: 3px solid rgba(255,255,255,0.5); outline-offset: 2px; }

        /* === KPI CARDS === */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1.5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .kpi-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
        }
        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--navy);
        }
        .kpi-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        /* === SEARCH === */
        .controls {
            padding: 0 2rem;
            max-width: 1200px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem 0.6rem 2.4rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            background: var(--bg-card);
            color: var(--text);
            transition: border-color 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,48,128,0.1); }
        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 200px;
        }
        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-dim);
        }
        .sort-select {
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: inherit;
            background: var(--bg-card);
            color: var(--text);
            cursor: pointer;
        }
        .sort-select:focus-visible { outline: 3px solid rgba(0,48,128,0.2); outline-offset: 2px; }

        /* === TABLE === */
        .table-wrap {
            padding: 0 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        thead {
            background: #f8f8f4;
        }
        th {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            position: sticky;
            top: 0;
            background: #f8f8f4;
            z-index: 2;
        }
        th.num { text-align: center; }
        td {
            padding: 0.7rem 1rem;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        td.num { text-align: center; font-variant-numeric: tabular-nums; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(0,48,128,0.03); }
        tr { transition: background 0.15s; }

        /* V2 sub-row */
        tr.v2-row td { background: rgba(0,48,128,0.02); border-bottom: 1px solid var(--border); padding-top: 0.4rem; padding-bottom: 0.4rem; }
        tr.v2-row:hover td { background: rgba(0,48,128,0.05); }
        .v2-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.68rem; font-weight: 600; background: rgba(0,48,128,0.08); color: var(--navy); }
        .v2-link { color: var(--navy); text-decoration: none; font-weight: 500; font-size: 0.82rem; transition: color 0.15s; }
        .v2-link:hover { color: var(--navy-light); text-decoration: underline; }

        .student-name {
            font-weight: 600;
            color: var(--text);
        }
        .student-link {
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }
        .student-link:hover { color: var(--navy-light); text-decoration: underline; }
        .student-link:focus-visible { outline: 3px solid rgba(0,48,128,0.2); outline-offset: 2px; border-radius: 2px; }

        /* Archived (arquivado) student */
        .archived-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-left: 0.5rem;
            padding: 0.12rem 0.5rem;
            border-radius: 20px;
            font-size: 0.66rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: rgba(120,113,108,0.12);
            color: #78716c;
            border: 1px solid rgba(120,113,108,0.25);
        }
        tr.archived-row td { background: rgba(120,113,108,0.04); }
        tr.archived-row:hover td { background: rgba(120,113,108,0.08); }
        tr.archived-row .student-link,
        tr.archived-row .student-name { color: var(--text-mid); }

        /* Progress bar in table */
        .progress-mini {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .progress-bar-mini {
            flex: 1;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            overflow: hidden;
            min-width: 60px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .progress-fill.green { background: var(--success); }
        .progress-fill.yellow { background: var(--warn); }
        .progress-fill.red { background: var(--danger); }
        .progress-pct {
            font-size: 0.75rem;
            font-weight: 600;
            min-width: 36px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* Status badges */
        .badge-complete {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-ok { background: var(--success-bg); color: var(--success); }
        .badge-partial { background: var(--warn-bg); color: var(--warn); }
        .badge-none { background: var(--danger-bg); color: var(--danger); }

        /* Loading */
        .loading-row td {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--navy);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Auto-refresh indicator */
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .pulse-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* === BASE DE ALUNOS BADGES === */
        .code-badge {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            background: rgba(0,48,128,0.06);
            color: #003080;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 500;
        }
        .pin-badge {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.82rem;
            font-weight: 700;
            color: #1a1a2e;
            background: #f5f5f0;
            border: 1px solid #d4d4cc;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .material-yes {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(22,163,74,0.1);
            color: #16a34a;
        }
        .material-yes svg { width: 14px; height: 14px; }
        .material-no { color: #c0c0b8; font-size: 1.1rem; }
        .base-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .base-filter-btn {
            padding: 0.4rem 0.9rem;
            font-size: 0.78rem;
            font-weight: 500;
            background: transparent;
            border: 1px solid #d4d4cc;
            color: #6b6b7b;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .base-filter-btn:hover { border-color: #003080; color: #003080; }
        .base-filter-btn.active { border-color: #003080; color: #003080; background: rgba(0,48,128,0.06); font-weight: 600; }

        .count-line {
            padding: 0 2rem;
            max-width: 1200px;
            margin: 0 auto 0.8rem;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        /* === ADD STUDENT BUTTON === */
        .add-btn {
            background: var(--success);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s;
        }
        .add-btn:hover { background: #15803d; }
        .add-btn:focus-visible { outline: 3px solid rgba(22,163,74,0.4); outline-offset: 2px; }

        /* === MODAL === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 14px;
            padding: 2rem;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 1.2rem;
        }
        .modal-field {
            margin-bottom: 1rem;
        }
        .modal-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }
        .modal-field input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.88rem;
            font-family: inherit;
            color: var(--text);
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .modal-field input:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(0,48,128,0.1); }
        .modal-field input[readonly] {
            background: #f0f0eb;
            color: var(--text-mid);
            cursor: default;
        }
        .modal-auto-tag {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--success);
            background: var(--success-bg);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.4rem;
        }
        .modal-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        .modal-actions button {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-mid);
        }
        .btn-cancel:hover { border-color: var(--text-mid); }
        .btn-save {
            background: var(--navy);
            border: 1px solid var(--navy);
            color: #fff;
        }
        .btn-save:hover { background: var(--navy-light); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .modal-feedback {
            font-size: 0.78rem;
            margin-top: 0.8rem;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            display: none;
        }
        .modal-feedback.success { display: block; background: var(--success-bg); color: var(--success); }
        .modal-feedback.error { display: block; background: var(--danger-bg); color: var(--danger); }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .kpi-row { padding: 1rem; }
            .controls { padding: 0 1rem; }
            .table-wrap { padding: 0 1rem 2rem; }
            .count-line { padding: 0 1rem; }
            th, td { padding: 0.5rem 0.6rem; font-size: 0.78rem; }
            .kpi-value { font-size: 1.6rem; }
        }
        @media (max-width: 480px) {
            .kpi-row { grid-template-columns: 1fr 1fr; }
            .header-right { display: none; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <img src="/assets/logo-alumni.png" alt="Alumni by Better" class="header-logo">
            <h1>Controle</h1>
        </div>
        <div class="header-right">
            <a href="/professor/helen-mendes.html" target="_blank" rel="noopener" title="Aluna fictícia — template oficial das aulas novas (não conta no roster)" style="font-size:.75rem;color:var(--text-dim);text-decoration:none;border:1px dashed var(--border);border-radius:8px;padding:.35rem .7rem;white-space:nowrap">Aluna Modelo</a>
            <a href="/aluno/helen-mendes.html" target="_blank" rel="noopener" title="Material do aluno da aluna modelo (espelho REGRA 34)" style="font-size:.75rem;color:var(--text-dim);text-decoration:none;border:1px dashed var(--border);border-radius:8px;padding:.35rem .7rem;white-space:nowrap">ver como aluno</a>
            <div class="auto-refresh">
                <div class="pulse-dot"></div>
                <span>Atualiza a cada 1h</span>
            </div>
            <span id="lastUpdate"></span>
            <button class="add-btn" onclick="openAddModal()" aria-label="Adicionar aluno">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo Aluno
            </button>
            <button class="refresh-btn" onclick="loadAll()" aria-label="Atualizar dados">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                Atualizar
            </button>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-row">
        <div class="kpi-card">
            <span class="kpi-label">Total Alunos</span>
            <span class="kpi-value" id="kpiAlunos">--</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Aulas Criadas</span>
            <span class="kpi-value" id="kpiCriadas">--</span>
            <span class="kpi-sub" id="kpiCriadasSub"></span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Aulas Concluidas</span>
            <span class="kpi-value" id="kpiConcluidas">--</span>
            <span class="kpi-sub" id="kpiConcluidasSub"></span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Taxa de Conclusao</span>
            <span class="kpi-value" id="kpiTaxa">--</span>
            <span class="kpi-sub">concluidas / criadas</span>
        </div>
    </div>

    <!-- Search & Sort & Filters -->
    <div class="controls">
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Buscar aluno, student card ou PIN..." oninput="filterAndRender()">
        </div>
        <select class="sort-select" id="sortSelect" onchange="filterAndRender()">
            <option value="name_asc">Nome A-Z</option>
            <option value="name_desc">Nome Z-A</option>
            <option value="pin_asc">PIN crescente</option>
            <option value="pin_desc">PIN decrescente</option>
            <option value="html_desc">Mais aulas criadas</option>
            <option value="pct_desc">Maior % conclusao</option>
        </select>
        <div class="base-filters">
            <button class="base-filter-btn active" onclick="setFilter('all', this)">Todos</button>
            <button class="base-filter-btn" onclick="setFilter('com', this)">Com Material</button>
            <button class="base-filter-btn" onclick="setFilter('sem', this)">Sem Material</button>
        </div>
    </div>

    <!-- Count line -->
    <div class="count-line" id="countLine">Carregando...</div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Aluno</th>
                    <th>Student Card</th>
                    <th>PIN</th>
                    <th>Professor</th>
                    <th class="num">Pacote</th>
                    <th class="num">Criadas</th>
                    <th class="num">Concluidas</th>
                    <th>Progresso</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="loading-row">
                    <td colspan="9"><span class="spinner"></span>Carregando dados...</td>
                </tr>
            </tbody>
        </table>
    </div>

<!-- Modal: Adicionar Aluno -->
<div class="modal-overlay" id="addModal" onclick="if(event.target===this)closeAddModal()">
    <div class="modal">
        <h2>Adicionar Novo Aluno</h2>
        <div class="modal-field">
            <label>Nome completo</label>
            <input type="text" id="modalName" placeholder="Ex: Maria Silva Santos" oninput="updateAutoFields()">
        </div>
        <div class="modal-field">
            <label>Student Card <span class="modal-auto-tag">Auto</span></label>
            <input type="text" id="modalCard" readonly>
        </div>
        <div class="modal-field">
            <label>PIN <span class="modal-auto-tag">Auto</span></label>
            <input type="text" id="modalPin" readonly>
        </div>
        <div class="modal-feedback" id="modalFeedback"></div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
            <button class="btn-save" id="btnSave" onclick="saveNewStudent()" disabled>Salvar</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
var allData = [];
var filterMode = 'all';
var archivedSlugs = {};

// Fallback professor map (from spreadsheet)
var profMap = {
    'aline-sberci': 'Fabio J.',
    'andreia-heins': 'Vinicius R.',
    'carlos-vinicius-vale-bassan': 'Rute M.',
    'carolina-paludetto-rodrigues': 'Polly W.',

// ============================================================
// SUPABASE FETCH FUNCTIONS
// ============================================================
async function fetchHtmlCounts() {
    var r = await fetch('/data/lesson-counts.json?t=' + Date.now());
    if (!r.ok) return [];
    var d = await r.json();
    return d.students || [];
}

async function fetchPerfis() {
    try {
        var resp = await sb.from('perfis').select('id,nome,num_aulas,ativo,status,deactivated,professor,alocacao,data');
        return (resp.data || []);
    } catch (e) { console.error('Supabase perfis error:', e); return []; }
}

async function fetchProgress() {
    try {
        var resp = await sb.from('lesson_progress').select('student_slug,lesson_number,inclass_done').eq('inclass_done', true);
        return (resp.data || []);
    } catch (e) { console.error('Supabase progress error:', e); return []; }
}

function decodeHtml(str) {
    var el = document.createElement('textarea');
    el.innerHTML = str;
    return el.value;
}

// ============================================================
// LOAD ALL — fetch Supabase data and merge with studentPins
// ============================================================
async function loadAll() {
    try {
        var [htmlCounts, perfis, progress] = await Promise.all([
            fetchHtmlCounts(),
            fetchPerfis(),
            fetchProgress()
        ]);

        // Build merged Supabase data keyed by slug
        var merged = {};

        // 1. Start with HTML counts (source of truth for lesson cards)
        htmlCounts.forEach(function(s) {
            merged[s.slug] = {
                slug: s.slug,
                name: decodeHtml(s.name),
                pacote: 0,
                criadas: s.aulasHtml,
                concluidas: 0,
                professor: ''
            };
        });

        // 2. Enrich with Supabase perfis (num_aulas = pacote)
        archivedSlugs = {};
        perfis.forEach(function(p) {
            var slug = p.id;
            if (p.deactivated === true) archivedSlugs[slug] = true;
            if (merged[slug]) {
                merged[slug].pacote = p.num_aulas || 0;
                if (p.nome) merged[slug].name = p.nome;
                merged[slug].professor = p.professor || (p.alocacao && p.alocacao.professor) || (p.data && p.data.professor) || profMap[slug] || '';
                merged[slug].archived = p.deactivated === true;
            }
        });

        // 3. Add completed lessons from lesson_progress
        progress.forEach(function(lp) {
            var slug = lp.student_slug;
            if (merged[slug] && lp.inclass_done) {
                merged[slug].concluidas++;
            }
        });

        allData = Object.values(merged).filter(function(d) { return d.criadas > 0; });
        updateKPIs();
        filterAndRender();
        updateTimestamp();
    } catch (e) {
        console.error('Error loading data:', e);
        document.getElementById('tableBody').innerHTML =
            '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--danger)">Erro ao carregar dados. Tente atualizar.</td></tr>';
    }
}

// ============================================================
// KPIs (from Supabase data only — students with material)
// ============================================================
function updateKPIs() {
    var totalCriadas = allData.reduce(function(s, d) { return s + d.criadas; }, 0);
    var totalConcluidas = allData.reduce(function(s, d) { return s + d.concluidas; }, 0);
    var totalPacote = allData.reduce(function(s, d) { return s + d.pacote; }, 0);
    var taxa = totalCriadas > 0 ? Math.round(totalConcluidas / totalCriadas * 100) : 0;

    document.getElementById('kpiAlunos').textContent = studentPins.length;
    document.getElementById('kpiCriadas').textContent = totalCriadas;
    document.getElementById('kpiCriadasSub').textContent = totalPacote > 0 ? 'de ' + totalPacote + ' no pacote total' : '';
    document.getElementById('kpiConcluidas').textContent = totalConcluidas;
    document.getElementById('kpiConcluidasSub').textContent = 'de ' + totalCriadas + ' criadas';
    document.getElementById('kpiTaxa').textContent = taxa + '%';
}

function findMatch(pinName) {
    // 1. Try explicit slug map first
    var slug = pinSlugMap[pinName];
    if (slug) {
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].slug === slug) return allData[i];
        }
    }
    // 2. Fallback: exact name match
    var pn = pinName.toLowerCase();
    for (var i = 0; i < allData.length; i++) {
        var dn = allData[i].name.toLowerCase();
        if (pn === dn) return allData[i];
        // Contains match (either direction)
        if (pn.indexOf(dn) !== -1 || dn.indexOf(pn) !== -1) return allData[i];
    }
    return null;
}

// ============================================================
// FILTER & SORT & RENDER (unified)
// ============================================================
function setFilter(mode, btn) {
    filterMode = mode;
    document.querySelectorAll('.base-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    filterAndRender();
}

function filterAndRender() {
    var q = document.getElementById('searchInput').value.toLowerCase();
    var sortBy = document.getElementById('sortSelect').value;

    // Build merged list from studentPins + allData
    var list = studentPins.map(function(sp) {
        var match = findMatch(sp.name);
        var slug = match ? match.slug : (pinSlugMap[sp.name] || null);
        return {
            name: sp.name,
            studentCard: sp.studentCard,
            pin: sp.pin,
            hasMaterial: sp.hasMaterial,
            slug: match ? match.slug : null,
            professor: match ? match.professor : '',
            pacote: match ? match.pacote : 0,
            criadas: match ? match.criadas : 0,
            concluidas: match ? match.concluidas : 0,
            archived: (match && match.archived) || (slug ? archivedSlugs[slug] === true : false)
        };
    });

    // Filter by mode
    if (filterMode === 'com') {
        list = list.filter(function(s) { return s.hasMaterial; });
    } else if (filterMode === 'sem') {
        list = list.filter(function(s) { return !s.hasMaterial; });
    }

    // Filter by search
    if (q) {
        list = list.filter(function(s) {
            return s.name.toLowerCase().indexOf(q) !== -1 ||
                   s.studentCard.toLowerCase().indexOf(q) !== -1 ||
                   s.pin.indexOf(q) !== -1;
        });
    }

    // Sort
    list.sort(function(a, b) {
        switch (sortBy) {
            case 'name_asc': return a.name.localeCompare(b.name, 'pt-BR');
            case 'name_desc': return b.name.localeCompare(a.name, 'pt-BR');
            case 'pin_asc': return parseInt(a.pin) - parseInt(b.pin);
            case 'pin_desc': return parseInt(b.pin) - parseInt(a.pin);
            case 'html_desc': return b.criadas - a.criadas || a.name.localeCompare(b.name, 'pt-BR');
            case 'pct_desc':
                var pa = a.criadas > 0 ? a.concluidas / a.criadas : 0;
                var pb = b.criadas > 0 ? b.concluidas / b.criadas : 0;
                return pb - pa || a.name.localeCompare(b.name, 'pt-BR');
            default: return 0;
        }
    });

    renderTable(list);
    document.getElementById('countLine').textContent = 'Exibindo ' + list.length + ' de ' + studentPins.length + ' alunos';
}

function renderTable(list) {
    var html = '';
    var dash = '<span style="color:var(--text-dim)">--</span>';

    list.forEach(function(d, i) {
        var hasMat = d.hasMaterial && d.criadas > 0;
        var pct = hasMat && d.criadas > 0 ? Math.round(d.concluidas / d.criadas * 100) : 0;
        var barClass = pct >= 80 ? 'green' : pct >= 40 ? 'yellow' : 'red';

        var archivedBadge = d.archived ? '<span class="archived-badge" title="Aluno arquivado no dashboard">Arquivado</span>' : '';

        html += '<tr' + (d.archived ? ' class="archived-row"' : '') + '>';
        html += '<td class="num" style="color:var(--text-dim);font-size:.75rem">' + (i + 1) + '</td>';

        // Name — link if has material/slug
        if (d.slug) {
            html += '<td><a href="/professor/' + d.slug + '.html" target="_blank" rel="noopener" class="student-link">' + d.name + '</a>' + archivedBadge + '</td>';
        } else {
            html += '<td><span class="student-name">' + d.name + '</span>' + archivedBadge + '</td>';
        }

        // Student Card
        html += '<td><span class="code-badge">' + d.studentCard + '</span></td>';

        // PIN
        html += '<td><span class="pin-badge">' + d.pin + '</span></td>';

        // Professor
        html += '<td style="font-size:.82rem;color:var(--text-mid)">' + (hasMat && d.professor ? d.professor : dash) + '</td>';

        // Pacote
        html += '<td class="num">' + (hasMat && d.pacote ? d.pacote : dash) + '</td>';

        // Criadas
        html += '<td class="num">' + (hasMat ? '<strong>' + d.criadas + '</strong>' : dash) + '</td>';

        // Concluidas
        html += '<td class="num">' + (hasMat ? '<strong>' + d.concluidas + '</strong>' : dash) + '</td>';

        // Progresso
        html += '<td>';
        if (hasMat) {
            html += '<div class="progress-mini">';
            html += '<div class="progress-bar-mini"><div class="progress-fill ' + barClass + '" style="width:' + pct + '%"></div></div>';
            html += '<span class="progress-pct" style="color:var(--' + (pct >= 80 ? 'success' : pct >= 40 ? 'warn' : 'danger') + ')">' + pct + '%</span>';
            html += '</div>';
        } else {
            html += dash;
        }
        html += '</td>';

        html += '</tr>';

        // V2 sub-rows (external projects)
        var extras = v2Courses[d.name];
        if (extras) {
            extras.forEach(function(v2) {
                html += '<tr class="v2-row">';
                html += '<td></td>';
                html += '<td style="padding-left:2.5rem"><span class="v2-badge">V2</span> <a href="' + v2.url + '" target="_blank" rel="noopener" class="v2-link">' + v2.label + '</a></td>';
                html += '<td colspan="7" style="font-size:.78rem;color:var(--text-dim)">Projeto externo</td>';
                html += '</tr>';
            });
        }
    });

    if (!html) {
        html = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-dim)">Nenhum aluno encontrado.</td></tr>';
    }

    document.getElementById('tableBody').innerHTML = html;
}

// ============================================================
function getNextSequence() {
    var maxCardNum = 0;
    var maxPin = 0;
    studentPins.forEach(function(s) {
        var cardNum = parseInt(s.studentCard.replace('SPVT', ''));
        var pin = parseInt(s.pin);
        if (cardNum > maxCardNum) maxCardNum = cardNum;
        if (pin > maxPin) maxPin = pin;
    });
    return {
        nextCard: 'SPVT' + (maxCardNum + 1),
        nextPin: String(maxPin + 1)
    };
}

function openAddModal() {
    var seq = getNextSequence();
    document.getElementById('modalName').value = '';
    document.getElementById('modalCard').value = seq.nextCard;
    document.getElementById('modalPin').value = seq.nextPin;
    document.getElementById('btnSave').disabled = true;
    var fb = document.getElementById('modalFeedback');
    fb.className = 'modal-feedback'; fb.textContent = '';
    document.getElementById('addModal').classList.add('open');
    setTimeout(function() { document.getElementById('modalName').focus(); }, 100);
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('open');
}

function updateAutoFields() {
    var name = document.getElementById('modalName').value.trim();
    document.getElementById('btnSave').disabled = name.length < 2;
}

function nameToSlug(name) {
    return name.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .trim().replace(/\s+/g, '-');
}

async function saveNewStudent() {
    var name = document.getElementById('modalName').value.trim();
    var card = document.getElementById('modalCard').value;
    var pin = document.getElementById('modalPin').value;
    var fb = document.getElementById('modalFeedback');
    var btn = document.getElementById('btnSave');

    if (!name) return;
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    var slug = nameToSlug(name);

    try {
        // 1. Save to base_alunos (controle-aulas data)
        var resp = await sb.from('base_alunos').insert({
            name: name,
            student_card: card,
            pin: pin,
            has_material: false
        });
        if (resp.error) throw new Error(resp.error.message);

        // 2. Create card on dashboard (perfis table)
        var resp2 = await sb.from('perfis').upsert({
            id: slug,
            nome: name,
            status: 'rascunho',
            nivel: '',
            num_aulas: 0,
            foco: '',
            ativo: false,
            data: {
                dadosFormulario: { nome: name },
                studentCard: card,
                pin: pin
            }
        });
        if (resp2.error) throw new Error(resp2.error.message);

        // Add to local array
        studentPins.push({
            name: name,
            studentCard: card,
            pin: pin,
            hasMaterial: false
        });

        // Update KPI and table
        document.getElementById('kpiAlunos').textContent = studentPins.length;
        filterAndRender();

        fb.className = 'modal-feedback success';
        fb.textContent = name + ' adicionado! Card: ' + card + ' | PIN: ' + pin + ' (aparece na dashboard tambem)';

        // Prepare for next addition
        setTimeout(function() {
            var seq = getNextSequence();
            document.getElementById('modalName').value = '';
            document.getElementById('modalCard').value = seq.nextCard;
            document.getElementById('modalPin').value = seq.nextPin;
            btn.textContent = 'Salvar';
            btn.disabled = true;
        }, 1500);

    } catch(e) {
        fb.className = 'modal-feedback error';
        fb.textContent = 'Erro ao salvar: ' + e.message;
        btn.textContent = 'Salvar';
        btn.disabled = false;
    }
}

// Load extra students from Supabase on init
async function loadExtraStudents() {
    try {
        var resp = await sb.from('base_alunos').select('name,student_card,pin,has_material').order('id', { ascending: true });
        if (resp.data && resp.data.length > 0) {
            var existingCards = {};
            studentPins.forEach(function(s) { existingCards[s.studentCard] = true; });
            resp.data.forEach(function(row) {
                if (!existingCards[row.student_card]) {
                    studentPins.push({
                        name: row.name,
                        studentCard: row.student_card,
                        pin: row.pin,
                        hasMaterial: row.has_material || false
                    });
                }
            });
        }
    } catch(e) { console.warn('Could not load extra students:', e); }
}

// Keyboard: Esc closes modal
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('addModal').classList.contains('open')) {
        closeAddModal();
    }
    if (e.key === 'Enter' && document.getElementById('addModal').classList.contains('open')) {
        var btn = document.getElementById('btnSave');
        if (!btn.disabled) saveNewStudent();
    }
});

// ============================================================
// INIT + AUTO-REFRESH
// ============================================================
loadExtraStudents().then(function() { loadAll(); });
setInterval(loadAll, 3600000); // 1 hour
