    'frequencia': 'frequência', 'antecedencia': 'antecedência',
    'emergencia': 'emergência', 'independencia': 'independência',
    'competencia': 'competência', 'referencia': 'referência',
    /* -ão words (non -ção) */
    'nao': 'não', 'entao': 'então', 'padrao': 'padrão', 'serao': 'serão',
    /* Accented vowels */
    'voce': 'você', 'pessimo': 'péssimo', 'ingles': 'inglês',
    'portugues': 'português', 'nivel': 'nível', 'ninguem': 'ninguém',
    'tambem': 'também', 'alem': 'além', 'porem': 'porém',
    'alguem': 'alguém', 'contem': 'contém',
    /* -ário/-ória/-ório words */
    'necessario': 'necessário', 'vocabulario': 'vocabulário',
    'formulario': 'formulário', 'intermediario': 'intermediário',
    'historico': 'histórico', 'obrigatorio': 'obrigatório',
    'curriculo': 'currículo',
    /* -ístico/-ástico */
    'linguistico': 'linguístico', 'turistico': 'turístico',
    /* -ício/-ícia */
    'exercicio': 'exercício', 'ficticio': 'fictício',
    /* -ica/-ico */
    'basicas': 'básicas', 'basica': 'básica', 'basico': 'básico',
    'medica': 'médica', 'medico': 'médico',
    'automatico': 'automático', 'automatica': 'automática',
    'pedagogica': 'pedagógica', 'pedagogicas': 'pedagógicas',
    'academico': 'acadêmico', 'publica': 'pública', 'publico': 'público',
    'pratica': 'prática', 'pratico': 'prático',
    'intrinseca': 'intrínseca', 'genuina': 'genuína',
    'unica': 'única', 'unico': 'único',
    'telefonico': 'telefônico', 'hipoteticos': 'hipotéticos',
    'especifico': 'específico', 'especifica': 'específica',
    /* -ão/-ões plurals */
    'opinioes': 'opiniões', 'sugestoes': 'sugestões', 'musicas': 'músicas',
    'experiencias': 'experiências', 'condicoes': 'condições',
    /* Accented proparoxytone / misc */
    'profissao': 'profissão', 'seguranca': 'segurança', 'mudanca': 'mudança',
    'avancado': 'avançado', 'avancada': 'avançada',
    'preferencias': 'preferências',
    'forcas': 'forças', 'forca': 'força',
    'estrategia': 'estratégia', 'serie': 'série',
    'proprio': 'próprio', 'propria': 'própria',
    'proximo': 'próximo', 'proxima': 'próxima', 'proximos': 'próximos',
    'ultimo': 'último', 'ultima': 'última',
    'diario': 'diário', 'previsao': 'previsão',
    'farmacia': 'farmácia',
    'concluidos': 'concluídos', 'extraidos': 'extraídos',
    'pos-curso': 'pós-curso',
    'politica': 'política', 'minimo': 'mínimo',
    'previo': 'prévio', 'previos': 'prévios',
    'capitalizacao': 'capitalização', 'alternancia': 'alternância',
    'conteudo': 'conteúdo', 'conteudos': 'conteúdos',
    /* 'audio' removido: ambígua EN/PT, muitos falsos positivos em tabelas curriculares */
    'acao': 'ação', 'acoes': 'ações',
    'vitoria': 'vitória',
    /* Common verbs/words */
    'faca': 'faça', 'comecou': 'começou',
    'tambem': 'também',
    /* City names in PT context */
    'Jau': 'Jaú'
  };

  /* Extract Portuguese-context text:
     1. Everything OUTSIDE script/style tags
     2. data-teacher attribute values (professor instructions in PT)
     3. EXCLUDE: audioMap entries, English slide content
  */

  /* Step 1: Extract data-teacher values (always in Portuguese) */
  var teacherTexts = [];
  var teacherRegex = /data-teacher\s*=\s*"([^"]*)"/gi;
  var tm;
  while ((tm = teacherRegex.exec(html)) !== null) {
    /* Decode HTML entities for checking */
    teacherTexts.push(tm[1].replace(/&[a-z]+;/gi, ' '));
  }

  /* Step 2: Get Portuguese sections (header, planning, pre-class, complementary) */
  var ptSections = '';

  /* Header (before first tab) */
  var firstTab = html.indexOf('id="tab-');
  if (firstTab > 0) ptSections += html.substring(0, firstTab);

  /* Tab Planning */
  var planStart = html.indexOf('id="tab-planning"');
  if (planStart !== -1) {
    var planEnd = html.indexOf('id="tab-exercises"', planStart);
    if (planEnd === -1) planEnd = html.indexOf('id="tab-inclass"', planStart);
    if (planEnd === -1) planEnd = planStart + 5000;
    ptSections += html.substring(planStart, planEnd);
  }

  /* Tab Pre-class — Portuguese labels, translations, instructions */
  var preStart = html.indexOf('id="tab-exercises"');
  if (preStart !== -1) {
    var preEnd = html.indexOf('id="tab-inclass"', preStart);
    if (preEnd === -1) preEnd = html.indexOf('slides-wrapper', preStart);
    if (preEnd === -1) preEnd = preStart + 10000;
    ptSections += html.substring(preStart, preEnd);
  }

  /* Tab Complementary */
  var compStart = html.indexOf('id="tab-complementary"');
  if (compStart !== -1) {
    var compEnd = html.indexOf('<scr' + 'ipt', compStart);
    if (compEnd === -1) compEnd = html.length;
    ptSections += html.substring(compStart, compEnd);
  }

  /* Step 3: Clean — remove scripts, styles, audioMap, English phrases in quotes */
  var cleaned = ptSections
    .replace(new RegExp('<scr' + 'ipt[\\s\\S]*?</scr' + 'ipt>', 'gi'), '')
    .replace(new RegExp('<sty' + 'le[\\s\\S]*?</sty' + 'le>', 'gi'), '')
    /* Remove audioMap object content (English keys/paths) */
    .replace(/const\s+audioMap\s*=\s*\{[\s\S]*?\};/gi, '')
    .replace(/var\s+audioMap\s*=\s*\{[\s\S]*?\};/gi, '')
    /* Remove English phrases in data-phrase/data-answer attributes */
    .replace(/data-phrase\s*=\s*"[^"]*"/gi, '')
    .replace(/data-answer\s*=\s*"[^"]*"/gi, '')
    /* Remove href/src URLs */
    .replace(/(?:href|src)\s*=\s*"[^"]*"/gi, '')
    /* Remove onclick handlers */
    .replace(/onclick\s*=\s*"[^"]*"/gi, '')
    .replace(/onchange\s*=\s*"[^"]*"/gi, '');

  /* Add data-teacher texts */
  cleaned += ' ' + teacherTexts.join(' ');

  /* Extract visible text from HTML */
  var textContent = cleaned.replace(/<[^>]+>/g, ' ');
  /* Decode HTML entities */
  textContent = textContent
    .replace(/&aacute;/gi, 'á').replace(/&eacute;/gi, 'é')
    .replace(/&iacute;/gi, 'í').replace(/&oacute;/gi, 'ó')
    .replace(/&uacute;/gi, 'ú').replace(/&atilde;/gi, 'ã')
    .replace(/&otilde;/gi, 'õ').replace(/&ccedil;/gi, 'ç')
    .replace(/&acirc;/gi, 'â').replace(/&ecirc;/gi, 'ê')
    .replace(/&ocirc;/gi, 'ô').replace(/&agrave;/gi, 'à')
    .replace(/&amp;/gi, '&').replace(/&lt;/gi, '<').replace(/&gt;/gi, '>')
    .replace(/&nbsp;/gi, ' ').replace(/&mdash;/gi, '—').replace(/&ndash;/gi, '–')
    .replace(/&ldquo;/gi, '"').replace(/&rdquo;/gi, '"')
    .replace(/&lsquo;/gi, "\u2018").replace(/&rsquo;/gi, "\u2019")
    .replace(/&#\d+;/gi, ' ');

  /* Step 4: Check for unaccented words */
  var foundItems = [];
  Object.keys(ACCENT_MAP).forEach(function(bad) {
    var good = ACCENT_MAP[bad];
    /* Case-insensitive word boundary match */
    var regex = new RegExp('\\b' + bad + '\\b', 'gi');
    var matches = textContent.match(regex);
    if (matches && matches.length > 0) {
      /* Verify these are NOT inside English phrases by checking surrounding context */
      var idx = textContent.search(regex);
      var context = textContent.substring(Math.max(0, idx - 30), Math.min(textContent.length, idx + bad.length + 30)).trim().replace(/\s+/g, ' ');
      foundItems.push({ word: bad + ' → ' + good, count: matches.length, context: context });
    }
  });

  /* Special check: "Sao Paulo" in Portuguese context (should be "São Paulo") */
  var spRegex = /Sao Paulo/g;
  var spMatches = textContent.match(spRegex);
  if (spMatches && spMatches.length > 0) {
    foundItems.push({ word: 'Sao Paulo → São Paulo', count: spMatches.length, context: 'Nome de cidade deve ter acento em contexto PT-BR' });
  }

  /* Special check: "ne?" should be "né?" */
  var neRegex = /\bne\?/gi;
  var neMatches = textContent.match(neRegex);
  if (neMatches && neMatches.length > 0) {
    foundItems.push({ word: 'ne? → né?', count: neMatches.length, context: 'Interjeição coloquial' });
  }

  /* Special check: "Ja " at start of sentence (should be "Já") */
  /* Exclude "Jaú", "Japão", "Jamaica" etc. — city/country names starting with Ja */
  var jaRegex = /(?:^|[.!?""]\s*)Ja(?![úùûüpP])\b/gm;
  var jaMatches = textContent.match(jaRegex);
  if (jaMatches && jaMatches.length > 0) {
    foundItems.push({ word: 'Ja → Já', count: jaMatches.length, context: 'Advérbio deve ter acento' });
  }

  /* Special check: " e " as verb "é" — heuristic: after noun/pronoun, before adjective/noun */
  /* Check pattern: lowercase-word + " e " + lowercase-word in PT context */
  var eRegex = /\b(?:isso|ele|ela|voce|você|que|qual)\s+e\s+(?:um|uma|o |a |muito|bom|mau|possivel|necessario|importante|incrivel|dificil)/gi;
  var eMatches = textContent.match(eRegex);
  if (eMatches && eMatches.length > 0) {
    foundItems.push({ word: '"e" como verbo → "é"', count: eMatches.length, context: eMatches[0].trim() });
  }

  if (foundItems.length === 0) {
    return { pass: true, details: '0 problemas de acentuação PT-BR', found: [] };
  }
  var total = foundItems.reduce(function(sum, f) { return sum + f.count; }, 0);
  return { pass: false, details: total + ' palavras sem acento correto', found: foundItems };
}

function checkListeningPlayer(html) {
  /* Check if material has IN CLASS with listening slides */
  var hasInClass = html.indexOf('tab-inclass') !== -1 || html.indexOf('data-slide') !== -1;
  if (!hasInClass) return { pass: true, details: 'Sem IN CLASS (não aplicável)' };
  var hasListening = html.indexOf('LISTENING') !== -1 || html.indexOf('Listen') !== -1;
  if (!hasListening) return { pass: true, details: 'Sem slides de Listening' };
  /* Check for new player components */
  var hasSeekbar = html.indexOf('lp-seekbar') !== -1 || html.indexOf('listening-player') !== -1;
  var hasSpeedControl = html.indexOf('lp-speed-btn') !== -1;
  var hasSkipButtons = html.indexOf('skipAudio') !== -1;
  var hasPlayerJS = html.indexOf('initPlayer') !== -1 || html.indexOf('togglePlayer') !== -1;
  if (hasSeekbar && hasSpeedControl && hasSkipButtons && hasPlayerJS) {
    return { pass: true, details: 'Player completo (seekbar + velocidade + skip)' };
  }
  var missing = [];
  if (!hasSeekbar) missing.push('seekbar');
  if (!hasSpeedControl) missing.push('controle de velocidade');
  if (!hasSkipButtons) missing.push('botões voltar/avançar 5s');
  if (!hasPlayerJS) missing.push('funções JS do player');
  /* Check if material has IN CLASS tab (new format) */
  var hasInClassTab = html.indexOf('tab-inclass') !== -1;
  /* Check for old player (waveform + simple play-btn) */
  /* Only flag old player if waveform is used in HTML (not just CSS definitions) */
  var waveformInHTML = (html.match(/class\s*=\s*["'][^"']*waveform[^"']*["']/gi) || []).length;
  var hasOldPlayer = waveformInHTML > 0 || (html.indexOf('play-btn') !== -1 && html.indexOf('lp-play') === -1);
  /* If material is old format (no tab-inclass), accept old player as functional */
  if (!hasInClassTab && hasOldPlayer) {
    return { pass: true, details: 'Formato antigo — player funcional (waveform/play-btn)' };
  }
  if (hasOldPlayer) missing.push('usa player ANTIGO (waveform + botão simples)');
  return { pass: false, details: 'Faltando: ' + missing.join(', ') };
}

function checkSVGs(html) {
  /* Find SVGs that might overflow — only flag truly unconstrained SVGs */
  var svgRegex = /<svg[^>]*>/gi;
  var matches = html.match(svgRegex) || [];
  var problems = [];
  matches.forEach(function(tag, idx) {
    var hasWidth = /width\s*=\s*["']\d/i.test(tag);
    var hasHeight = /height\s*=\s*["']\d/i.test(tag);
    var hasViewBox = /viewBox/i.test(tag);
    var hasClass = /class\s*=/i.test(tag);
    var hasStyle = /style\s*=.*(?:width|max-width)/i.test(tag);
    /* SVGs with class are typically constrained by CSS parent rules — safe */
    if (hasClass || hasStyle || (hasWidth && hasHeight)) return;
    /* SVG without ANY sizing mechanism — check if viewBox is large (non-icon) */
    if (hasViewBox) {
      var vbMatch = tag.match(/viewBox\s*=\s*["']([^"']+)["']/i);
      if (vbMatch) {
        var parts = vbMatch[1].trim().split(/\s+/);
        if (parts.length === 4) {
          var w = parseFloat(parts[2]);
          var h = parseFloat(parts[3]);
          /* Small viewBox (≤ 48) = standard icon, safe with viewBox scaling */
          if (w <= 48 && h <= 48) return;
          /* Large viewBox without any constraint = real risk */
          problems.push('SVG #' + (idx+1) + ' viewBox ' + w + 'x' + h + ' sem dimensões (risco de overflow)');
        }
      }
    } else {
      /* No viewBox, no width, no height, no class = truly broken */
      problems.push('SVG #' + (idx+1) + ' sem viewBox nem dimensões');
    }
  });
  if (problems.length === 0) {
    return { pass: true, details: matches.length + ' SVGs verificados, 0 problemas' };
  }
  return { pass: false, details: problems.length + ' SVGs com risco de overflow', issues: problems.slice(0, 5) };
}

function checkCapitalization(html) {
  var problems = [];
  var seen = {};
  function addProblem(msg) { if (!seen[msg]) { seen[msg] = true; problems.push(msg); } }
  /* Check if CSS has text-transform:capitalize for vocab-card-word or match-word */
  var hasVocabCapitalize = /vocab-card-word[^}]*text-transform\s*:\s*capitalize/i.test(html);
  var hasMatchCapitalize = /match-word[^}]*text-transform\s*:\s*capitalize/i.test(html);
  /* 1. Check vocab cards — words/expressions should start with uppercase (EXPANDED classes) */
  var vocabClasses = 'vocab-card-word|slot-word|card-word|match-word|vocab-word|expression|collocation|phrase|word-text|sp-en';
  var vocabWords = html.match(new RegExp('class\\s*=\\s*["\'][^"\']*(?:' + vocabClasses + ')[^"\']*["\'][^>]*>([^<]+)', 'gi')) || [];
  vocabWords.forEach(function(m) {
    var text = m.replace(/^[^>]+>/, '').trim();
    var classMatch = m.match(/class\s*=\s*["']([^"']+)["']/i);
    var classes = classMatch ? classMatch[1] : '';
    var skipCapCheck = (hasVocabCapitalize && /vocab-card-word/.test(classes)) || (hasMatchCapitalize && /match-word/.test(classes));
    /* Flag standalone vocab words/expressions (1-8 words — includes multi-word expressions like "run a business") */
    var wordCount = text.split(/\s+/).length;
    if (text && text.length > 1 && wordCount <= 8 && text[0] === text[0].toLowerCase() && text[0] !== text[0].toUpperCase() && !skipCapCheck) {
      addProblem('Vocabulário com minúscula: "' + text.substring(0, 50) + '"');
    }
  });
  /* 1b. REMOVED: <strong>/<b> generic check causes false positives.
     Bold text in sentences = grammar emphasis (is, has worked, deals with), NOT vocab. */
  /* 1c. Check headings (h3, h4, h5) that start with lowercase */
  var headings = html.match(/<h[3-5][^>]*>([^<]+)/gi) || [];
  headings.forEach(function(m) {
    var text = m.replace(/^<[^>]+>/, '').trim();
    if (text && text.length > 1 && /^[a-z]/.test(text)) {
      addProblem('Heading com minúscula: "' + text.substring(0, 50) + '"');
    }
  });
  /* 2. Check survival card phrases — should start with uppercase */
  var survivalPhrases = html.match(/class\s*=\s*["'][^"']*(?:sp-en|survival-text)[^"']*["'][^>]*>([^<]+)/gi) || [];
  survivalPhrases.forEach(function(m) {
    var text = m.replace(/^[^>]+>/, '').trim();
    if (text && text.length > 2 && text[0] === text[0].toLowerCase() && /[a-z]/.test(text[0])) {
      addProblem('Survival card com minúscula: "' + text.substring(0, 40) + '..."');
    }
  });
  /* 3. Check exercise prompts and quiz questions */
  var questions = html.match(/class\s*=\s*["'][^"']*(?:quiz-question|fill-blank-sentence|speech-phrase)[^"']*["'][^>]*>([^<]+)/gi) || [];
  questions.forEach(function(m) {
    var text = m.replace(/^[^>]+>/, '').replace(/&[^;]+;/g, ' ').trim();
    /* Only flag if it's clearly a full sentence (3+ words, starts with lowercase letter, not a code/variable) */
    var wordCount = text.split(/\s+/).length;
    if (text && text.length > 10 && wordCount >= 3 && /^[a-z]/.test(text) && text.indexOf('"') !== 0 && text.indexOf('(') !== 0) {
      addProblem('Frase com minúscula: "' + text.substring(0, 40) + '..."');
    }
  });
  if (problems.length === 0) return { pass: true, details: 'Capitalização OK' };
  return { pass: false, details: problems.length + ' problemas de capitalização', issues: problems.slice(0, 15) };
}

function checkVoiceAlternation(html) {
  /* ================================================================
     VOICE ALTERNATION + SEMANTIC VOICE MATCH
     Checks:
     1. Both Arthur and Ellen are used (alternation)
     2. data-voice matches the CONTENT gender (semantic check)
     3. speakText phrases with gendered content have correct voice
     ================================================================ */

  var issues = [];

  /* ---- 1. Extract ALL data-voice with surrounding content ---- */
  var voiceLineRegex = /<[^>]*data-voice\s*=\s*["'](\w+)["'][^>]*>([\s\S]*?)(?=<[^>]*data-voice|<\/div>\s*<\/div>\s*<\/div>|$)/gi;
  var voices = [];
  var vm;

  /* Simpler extraction: get voice + nearby speakText content */
  var voiceAttrRegex = /data-voice\s*=\s*["'](\w+)["']/gi;
  var allVoicePositions = [];
  while ((vm = voiceAttrRegex.exec(html)) !== null) {
    var voice = vm[1].toLowerCase();
    voices.push(voice);
    /* Grab ~500 chars after the data-voice to find the phrase content */
    var context = html.substring(vm.index, Math.min(html.length, vm.index + 500));
    /* Extract speakText phrase from this context */
    var phraseMatch = context.match(/speakText\s*\(\s*['"]([^'"]{5,})['"]/);
    var phrase = phraseMatch ? phraseMatch[1].replace(/\\'/g, "'") : '';
    allVoicePositions.push({ voice: voice, phrase: phrase, position: vm.index });
  }

  /* Also check JS-based dynamic dialogues with voice property */
  var jsVoices = html.match(/voice\s*:\s*["'](arthur|ellen)["']/gi) || [];
  var totalVoices = voices.length + jsVoices.length;

  if (totalVoices === 0) {
    var hasDialogue = /dialogue/i.test(html);
    if (!hasDialogue) return { pass: true, details: 'Sem diálogos (não aplicável)' };
    return { pass: false, details: 'Diálogos encontrados mas nenhum data-voice', issues: [] };
  }

  var unique = [];
  voices.forEach(function(v) { if (unique.indexOf(v) === -1) unique.push(v); });
  jsVoices.forEach(function(m) { var v = m.match(/["'](\w+)["']/)[1].toLowerCase(); if (unique.indexOf(v) === -1) unique.push(v); });

  var invalid = voices.filter(function(v) { return v !== 'arthur' && v !== 'ellen'; });
  if (invalid.length > 0) {
    issues.push(invalid.length + ' vozes inválidas: ' + invalid.slice(0, 5).join(', '));
  }

  if (unique.length === 1 && totalVoices > 2) {
    issues.push(totalVoices + ' linhas mas apenas voz "' + unique[0] + '" (falta alternância)');
  }

  /* ---- 2. SEMANTIC VOICE CHECK ---- */
  /* Phrases that are CLEARLY masculine → should be Arthur
     IMPORTANT: Mr./Mrs./Ms./Miss are forms of ADDRESS, not speaker identity.
     "Thank you, Ms. Pinho" said by Arthur (male) is CORRECT — he's addressing a woman.
     Only flag Mr./Mrs. when the SPEAKER self-identifies: "I'm Mr. Smith" */
  var malePatterns = [
    /\bI'?m a (?:business\s*man|man|father|husband|brother|uncle|grandfather|boy|guy|king|prince|sir|waiter|actor|host)\b/i,
    /\bI am a (?:business\s*man|man|father|husband|brother|uncle|grandfather|boy|guy|king|prince|sir|waiter|actor|host)\b/i,
    /\bmy (?:wife|girlfriend)\b/i,
    /\bhe said\b/i,
    /\bI(?:'m| am)\s+(?:Mr\.|Mister)\s+[A-Z]/i
  ];

  /* Phrases that are CLEARLY feminine → should be Ellen
     Same rule: only flag when speaker self-identifies, not when addressing someone */
  var femalePatterns = [
    /\bI'?m a (?:business\s*woman|woman|mother|wife|sister|aunt|grandmother|girl|queen|princess|waitress|actress|hostess)\b/i,
    /\bI am a (?:business\s*woman|woman|mother|wife|sister|aunt|grandmother|girl|queen|princess|waitress|actress|hostess)\b/i,
    /\bmy (?:husband|boyfriend)\b/i,
    /\bshe said\b/i,
    /\bI(?:'m| am)\s+(?:Mrs\.|Miss|Ms\.)\s+[A-Z]/i
  ];

  /* Common male character names */
  var maleNames = /\b(?:David|John|James|Robert|Roberto|Michael|William|Daniel|Carlos|Pedro|Lucas|Bruno|Tom|Jack|Mark|Paul|Steve|Chris|Mike|Bob|Joe|Ben|Sam|Leo|Max|Ryan|Milton|Luiz|Rafael|Percival|Ricardo|Eduardo|Fernando|Gustavo|Henrique|Jorge|Marcos|Andre|Antonio|Francisco|Sergio|Mario|Rodrigo|Felipe|Gabriel|Matheus|Diego|Thiago|Leonardo|Cesar|Fabio|Alexandre|Wagner|Ronaldo|Claudio|Marcelo|Alan|Alex|Brian|Kevin|Jason|Justin|Tyler|Matthew|Andrew|Brandon|Scott|Eric|Patrick|Frank|Thomas|Richard|Joseph|Kenneth|Timothy|Larry|Peter|George|Adam|Ian|Nathan|Oliver|Henry|Owen|Charles|Harry|Arthur|Edward|Albert|Raymond)\b/i;
  /* Common female character names */
  var femaleNames = /\b(?:Sarah|Maria|Ana|Patricia|Gabriela|Elaine|Helen|Helena|Julia|Laura|Emma|Sophie|Lisa|Mary|Jane|Kate|Anna|Lucy|Amy|Rose|Alice|Diana|Eva|Mia|Nina|Eduarda|Daniela|Maisa|Pricila|Priscila|Vanessa|Tania|Tânia|Fernanda|Camila|Amanda|Beatriz|Larissa|Leticia|Mariana|Natalia|Renata|Tatiana|Juliana|Carolina|Isabela|Bruna|Carla|Sandra|Sonia|Monica|Claudia|Silvia|Andrea|Adriana|Luciana|Cristina|Raquel|Paula|Luana|Bianca|Vivian|Simone|Debora|Rachel|Rebecca|Jessica|Stephanie|Catherine|Elizabeth|Margaret|Susan|Karen|Nancy|Betty|Linda|Barbara|Jennifer|Angela|Melissa|Nicole|Samantha|Victoria|Olivia|Sophia|Emily|Charlotte|Grace|Chloe|Hannah|Ella|Lily|Abigail|Natalie)\b/i;

  var semanticMismatches = [];

  allVoicePositions.forEach(function(vp) {
    if (!vp.phrase) return;
    var phrase = vp.phrase;
    var voice = vp.voice;

    /* Detect speaker identity: "I am [Name]" or "I'm [Name]" reveals WHO is speaking */
    var speakerNameMatch = phrase.match(/\bI(?:'m| am)\s+([A-Z][a-z]+)\b/);
    var speakerIsFemale = speakerNameMatch && femaleNames.test(speakerNameMatch[1]);
    var speakerIsMale = speakerNameMatch && maleNames.test(speakerNameMatch[1]);

    /* Detect VOCATIVE pattern: "Name, ..." means someone is TALKING TO that person,
       not that person speaking. E.g. "Eduarda, could you..." = male talking TO Eduarda.
       The name at start + comma = addressee, NOT the speaker. */
    var vocativeMatch = phrase.match(/^([A-Z][a-z]+)\s*,/);
    var isAddressingFemale = vocativeMatch && femaleNames.test(vocativeMatch[1]);
    var isAddressingMale = vocativeMatch && maleNames.test(vocativeMatch[1]);

    /* Check male content with Ellen voice */
    if (voice === 'ellen') {
      if (!speakerIsFemale) {
        var isMaleContent = malePatterns.some(function(p) { return p.test(phrase); });
        if (!isMaleContent) {
          var firstWords = phrase.split(/\s+/).slice(0, 3).join(' ');
          /* Skip vocative: "James, ..." with Ellen = female talking TO James = correct */
          /* Skip greeting: "Hi/Hello/Hey James" = speaker greeting James, not James speaking */
          var isGreeting = /^(?:Hi|Hello|Hey|Dear|Thank you|Thanks|Good morning|Good afternoon|Good evening|Nice to meet you)\b/i.test(phrase);
          isMaleContent = !isAddressingMale && !isGreeting && maleNames.test(firstWords) && !femaleNames.test(firstWords);
        }
        var hasFemaleRef = femalePatterns.some(function(p) { return p.test(phrase); }) ||
          (/\bI(?:'m| am)\b/i.test(phrase) && femaleNames.test(phrase));
        if (isMaleContent && !hasFemaleRef) {
          semanticMismatches.push('Ellen em frase masculina: "' + phrase.substring(0, 60) + '..."');
        }
      }
    }

    /* Check female content with Arthur voice */
    if (voice === 'arthur') {
      if (!speakerIsMale) {
        var isFemaleContent = femalePatterns.some(function(p) { return p.test(phrase); });
        if (!isFemaleContent) {
          var firstWords2 = phrase.split(/\s+/).slice(0, 3).join(' ');
          /* Skip vocative: "Eduarda, ..." with Arthur = male talking TO Eduarda = correct */
          /* Skip greeting: "Hi/Hello/Hey Eduarda" = speaker greeting Eduarda, not Eduarda speaking */
          var isGreeting2 = /^(?:Hi|Hello|Hey|Dear|Thank you|Thanks|Good morning|Good afternoon|Good evening|Nice to meet you)\b/i.test(phrase);
          isFemaleContent = !isAddressingFemale && !isGreeting2 && femaleNames.test(firstWords2) && !maleNames.test(firstWords2);
        }
        var hasMaleRef = malePatterns.some(function(p) { return p.test(phrase); }) ||
          (/\bI(?:'m| am)\b/i.test(phrase) && maleNames.test(phrase));
        if (isFemaleContent && !hasMaleRef) {
          semanticMismatches.push('Arthur em frase feminina: "' + phrase.substring(0, 60) + '..."');
        }
      }
    }
  });

  /* ---- 3. Check NON-DIALOGUE speakText for gendered content without data-voice ---- */
  /* Find speakText calls NOT inside a data-voice context */
  var allSpeakRegex = /speakText\s*\(\s*['"]([^'"]{5,})['"]/gi;
  var sm;
  while ((sm = allSpeakRegex.exec(html)) !== null) {
    var speakPhrase = sm[1].replace(/\\'/g, "'");
    var pos = sm.index;

    /* Check if this speakText is within ~300 chars of a data-voice attribute */
    var nearVoice = allVoicePositions.some(function(vp) {
      return Math.abs(vp.position - pos) < 300;
    });
    if (nearVoice) continue; /* Already covered by dialogue check */

    /* Check for strongly gendered content that should have specific voice */
    var isMale = malePatterns.some(function(p) { return p.test(speakPhrase); });
    var isFemale = femalePatterns.some(function(p) { return p.test(speakPhrase); });

    if (isMale || isFemale) {
      var expectedVoice = isMale ? 'Arthur' : 'Ellen';
      semanticMismatches.push('Frase sem data-voice (deveria ser ' + expectedVoice + '): "' + speakPhrase.substring(0, 60) + '"');
    }
  }

  if (semanticMismatches.length > 0) {
    issues = issues.concat(semanticMismatches);
  }

  if (issues.length > 0) {
    return { pass: false, details: issues.length + ' problema(s) de voz', issues: issues.slice(0, 15) };
  }
  return { pass: true, details: totalVoices + ' data-voice (' + unique.join('/') + ') — conteúdo semântico OK' };
}

function checkLayout(html) {
  var problems = [];
  /* 1. Check matching grid — should be single column (not 2-column) per CLAUDE.md */
  var matchGrids = html.match(/class\s*=\s*["'][^"']*match-grid[^"']*["']/gi) || [];
  /* Check if match-row uses grid/flex that puts 2 items per row */
  var hasMultiColMatch = /match-grid[^{]*\{[^}]*grid-template-columns\s*:\s*repeat\s*\(\s*2/i.test(html) ||
    /match-row[^{]*\{[^}]*display\s*:\s*inline/i.test(html);
  if (hasMultiColMatch && matchGrids.length > 0) {
    problems.push('Matching em 2 colunas (REGRA: deve ser coluna única)');
  }
  /* 2. Check for "Selecione..." in Portuguese (should be "Select..." in matching) */
  var ptSelects = html.match(/Selecione\.\.\./gi) || [];
  if (ptSelects.length > 0) {
    problems.push(ptSelects.length + ' dropdowns com "Selecione..." em português (deve ser "Select...")');
  }
  /* 2b. Check match-grid — only flag if it has a multi-column grid definition */
  /* display:grid without grid-template-columns defaults to single column, which is fine */
  /* 3. Check vocab cards layout — should be vertical (flex-direction:column), NOT multi-column grid */
  var vocabMultiCol = /vocab-cards?[^{]*\{[^}]*grid-template-columns\s*:\s*repeat\s*\(\s*[2-9]/i.test(html);
  if (vocabMultiCol) {
    problems.push('Vocab cards em grid multi-colunas (REGRA: lista vertical, 1 por linha)');
  }
  /* 4. Check for overflow issues — elements wider than container */
  var overflowHidden = /overflow\s*:\s*hidden/gi.test(html);
  var hasHScroll = /overflow-x\s*:\s*scroll|overflow-x\s*:\s*auto/gi.test(html);
  /* 5. Check buttons without min-height 44px */
  var smallButtons = html.match(/\.btn[^{]*\{[^}]*(?!min-height)[^}]*height\s*:\s*(\d+)px/gi) || [];
  smallButtons.forEach(function(m) {
    var h = m.match(/height\s*:\s*(\d+)px/i);
    if (h && parseInt(h[1]) < 44) problems.push('Botão com altura < 44px (touch target pequeno)');
  });

  /* 6. Check for invisible text (white text on white/light background) */
  var invisibleCount = 0;
  /* 6a. CSS rules: color:#fff with background:#fff in SAME CSS rule block (run on CSS only, not full HTML) */
  var styleBlocks6a = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
  var cssOnly = styleBlocks6a.join(' ');
  var whiteOnWhite = cssOnly.match(/color\s*:\s*#fff[^;]*;[^}]*background\s*:\s*#fff/gi) || [];
  var whiteOnWhite2 = cssOnly.match(/background\s*:\s*#fff[^;]*;[^}]*color\s*:\s*#fff/gi) || [];
  invisibleCount += whiteOnWhite.length + whiteOnWhite2.length;
  /* 6b. REMOVED — comp-q/question/answer with inline color:white are inside dark IN CLASS slides */
  /* 6c. REMOVED — too many false positives. White text with color:#fff is normal in:
     - IN CLASS slides (dark backgrounds)
     - Elements with background:var(--accent), var(--navy), var(--black), gradients
     - Buttons, badges, headers with colored backgrounds
     The 6d/6e checks below catch the real problems (CSS rules for question/answer
     components that set white color without a dark background). */
  /* 6d. CSS rules where comp-q, question-card, q-text have color:#fff */
  var styleBlocks = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
  var allCSS = styleBlocks.join(' ');
  var suspectRules = allCSS.match(/(?:comp-q|question-card|q-text|question|answer)[^{]*\{[^}]*color\s*:\s*(?:#fff|white)[^}]*/gi) || [];
  suspectRules.forEach(function(rule) {
    /* Only flag if the rule doesn't also set a dark background */
    if (!/background(?:-color)?\s*:\s*(?:#[0-3][0-9a-f]{5}|var\(--black\)|var\(--navy\)|rgba?\s*\(\s*\d{1,2})/i.test(rule)) {
      invisibleCount++;
      problems.push('CSS com cor branca sem fundo escuro: "' + rule.substring(0, 80).trim() + '..."');
    }
  });
  /* 6e. INHERITED COLOR: elements with light background inside dark slides without explicit dark text */
  var lightBgClasses = html.match(/\.(?:comp-q|question-card|q-text|comprehension|answer-card)[^{]*\{[^}]*\}/gi) || [];
  lightBgClasses.forEach(function(rule) {
    /* Note: var(--white) in Alumni materials = #1a1a2e (dark text), NOT white background */
    var hasLightBg = /background\s*:\s*(?:#fff(?!f)|white|#fafafa|var\(--bg-card\))/i.test(rule);
    var hasDarkColor = /color\s*:\s*(?:#[0-3][0-9a-f]{5}|#[0-3][0-9a-f]{2}|var\(--text\)|var\(--dark\)|var\(--black\)|#1a1a|#2d2d|#333|#374)/i.test(rule);
    var hasWhiteColor = /color\s*:\s*(?:#fff|white|#e[0-9a-f]|#f[0-9a-f])/i.test(rule);
    if (hasLightBg && (!hasDarkColor || hasWhiteColor)) {
      invisibleCount++;
      problems.push('CSS com fundo claro e sem cor escura explícita — texto herda branco do pai e fica invisível');
    }
  });
  /* 6f. REMOVED — inline background:#fff inside dark slides is a valid pattern
     (cards, comprehension boxes). The card's CSS class handles text color. */
  if (invisibleCount > 0) {
    problems.push('Texto potencialmente invisível — ' + invisibleCount + ' elementos com fundo claro dentro de contexto escuro sem cor de texto definida');
  }
  /* 7. Check for text overflow in slides (content wider than slide) */
  var overflowText = html.match(/class\s*=\s*["'][^"']*(?:mistake|error|wrong|common-mistake)[^"']*["'][^>]*style\s*=\s*["'][^"']*(?:display\s*:\s*flex|display\s*:\s*grid)[^"']*["']/gi) || [];
  /* Check for very long inline text without word-break */
  var longInlineText = html.match(/<(?:span|div|p)[^>]+style\s*=\s*["'][^"']*(?:white-space\s*:\s*nowrap)[^"']*["'][^>]*>[^<]{80,}/gi) || [];
  if (longInlineText.length > 0) {
    problems.push(longInlineText.length + ' textos longos com nowrap (podem estourar o slide)');
  }
  /* 7b. REMOVED: Long text in slides check — too many false positives.
     Dialogues, explanations, and descriptions legitimately have 200+ chars. */

  if (problems.length === 0) return { pass: true, details: 'Layout OK' };
  return { pass: false, details: problems.length + ' problemas de layout', issues: problems.slice(0, 10) };
}

function checkLessonSelector(html) {
  /* Check if IN CLASS has multiple lessons' slides without a selector */
  var hasInClass = html.indexOf('tab-inclass') !== -1 || html.indexOf('data-slide=') !== -1;
  if (!hasInClass) return { pass: true, details: 'Sem IN CLASS (não aplicável)' };

  /* Count total slides */
  var dsRe = /data-slide\s*=\s*["'](\d+)["']/g;
  var sn = {}; var dm;
  while ((dm = dsRe.exec(html)) !== null) sn[dm[1]] = true;
  var totalSlides = Object.keys(sn).length;

  /* If 50 or fewer slides, it's 1 lesson (90min can have up to 45) — OK */
  if (totalSlides <= 50) return { pass: true, details: totalSlides + ' slides (1 aula — OK)' };

  /* Multiple lessons — check if there's a FUNCTIONAL lesson selector
     Needs BOTH: visual selector UI AND JS logic that filters/hides slides per lesson */
  var hasSelectorUI = html.indexOf('Select Lesson') !== -1 ||
    html.indexOf('inclass-lesson-card') !== -1 ||
    html.indexOf('lesson-selector') !== -1;

  var hasSelectorJS = html.indexOf('showLessonSlides') !== -1 ||
    html.indexOf('filterSlides') !== -1 ||
    html.indexOf('hideAllSlides') !== -1 ||
    html.indexOf('showLesson(') !== -1 ||
    html.indexOf('startLesson(') !== -1 ||
    /* Check for slide visibility toggling by lesson */
    html.indexOf('data-lesson=') !== -1 ||
    /* New pattern: lesson boundary navigation (lessonRanges + currentLessonRange) */
    (html.indexOf('lessonRanges') !== -1 && html.indexOf('currentLessonRange') !== -1);

  if (hasSelectorUI && hasSelectorJS) {
    return { pass: true, details: totalSlides + ' slides com seletor funcional' };
  }
  if (hasSelectorUI && !hasSelectorJS) {
    /* Has UI but no JS — selector exists but doesn't work */
    return { pass: false, details: totalSlides + ' slides — seletor visual existe mas NÃO filtra slides (falta JS)' };
  }

  /* Count approximate number of lessons (slides / ~25-30 per lesson) */
  var approxLessons = Math.round(totalSlides / 28);
  return { pass: false, details: totalSlides + ' slides (~' + approxLessons + ' aulas) SEM seletor — todas abrem juntas' };
}

function checkContrast(html) {
  var problems = [];

  /* ── 1. Extract accent color ── */
  var accentMatch = html.match(/--accent\s*:\s*(#[0-9a-fA-F]{3,8})/);
  var accent = accentMatch ? accentMatch[1] : null;

  /* ── Helper: parse hex to RGB ── */
  function hexToRGB(hex) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    return { r: parseInt(hex.substring(0,2),16), g: parseInt(hex.substring(2,4),16), b: parseInt(hex.substring(4,6),16) };
  }

  /* ── Helper: relative luminance (WCAG 2.1) ── */
  function luminance(rgb) {
    var a = [rgb.r, rgb.g, rgb.b].map(function(v) { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
    return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
  }

  /* ── Helper: contrast ratio ── */
  function contrastRatio(l1, l2) {
    var lighter = Math.max(l1, l2), darker = Math.min(l1, l2);
    return (lighter + 0.05) / (darker + 0.05);
  }

  /* ── 2. Check accent color contrast against dark overlay (only if slides use background images) ── */
  var whiteLum = luminance({ r: 255, g: 255, b: 255 });
  if (accent) {
    var accentRGB = hexToRGB(accent);
    var accentLum = luminance(accentRGB);
    /* Dark overlay ~ rgba(0,0,0,0.45) over mid-brightness image ≈ #4a4a4a effective */
    var darkOverlayLum = luminance({ r: 74, g: 74, b: 74 });
    var ratioOnDark = contrastRatio(accentLum, darkOverlayLum);

    /* Only check if there are actual slides with background images */
    var hasBgImageSlides = /background-image\s*:\s*url/i.test(html) || /data-bg\s*=/i.test(html);
    if (hasBgImageSlides) {
      var accentOverriddenToWhite = /\.slide-image\s+\.accent\s*\{[^}]*color\s*:\s*#fff/i.test(html) ||
        /\.slide-image\s+\.accent\s*\{[^}]*color\s*:\s*white/i.test(html) ||
        /\.slide-image\s+\.accent\s*\{[^}]*color\s*:\s*rgba\(255/i.test(html);
      var hasAnyShadow = html.indexOf('text-shadow') !== -1;
      if (ratioOnDark < 3 && !hasAnyShadow && !accentOverriddenToWhite) {
        problems.push('Cor accent ' + accent + ' tem contraste ' + ratioOnDark.toFixed(1) + ':1 sobre overlay escuro (mín 3:1 para texto grande). Texto accent fica ilegível sobre imagens de fundo.');
      }
    }
  }

  /* ── 3. Slides with background-image: check overlay opacity ── */
  var inClassStart = html.indexOf('id="tab-inclass"');
  if (inClassStart === -1) inClassStart = html.indexOf("id='tab-inclass'");
  if (inClassStart !== -1) {
    var inClassEnd = html.indexOf('id="tab-complementary"', inClassStart);
    if (inClassEnd === -1) inClassEnd = html.length;
    var inClassHtml = html.substring(inClassStart, inClassEnd);

    /* Find slides that have background-image */
    var slideRegex = /<div[^>]*class\s*=\s*["'][^"']*slide[^"']*["'][^>]*style\s*=\s*["'][^"']*background-image[^"']*["'][^>]*>([\s\S]*?)<\/div>/gi;
    var bgSlides = inClassHtml.match(/<div[^>]*(?:background-image\s*:\s*url|data-bg)[^>]*>/gi) || [];
    /* Also count overlay elements */
    var overlayRegex = /(?:overlay|header-overlay)[^{]*\{[^}]*(?:background|rgba)[^}]*\}/gi;
    var styleBlock = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [];
    var allStyles = styleBlock.join(' ');

    /* Check for overlay opacity in inline styles within slides */
    var overlayOpacityRegex = /rgba\s*\(\s*0\s*,\s*0\s*,\s*0\s*,\s*([\d.]+)\s*\)/g;
    var overlayMatches = [];
    var om;
    while ((om = overlayOpacityRegex.exec(inClassHtml)) !== null) {
      overlayMatches.push(parseFloat(om[1]));
    }
    /* Also check named overlay classes in style blocks */
    while ((om = overlayOpacityRegex.exec(allStyles)) !== null) {
      overlayMatches.push(parseFloat(om[1]));
    }

    /* Check if any overlays are too light — but compensate if text-shadow is present */
    var hasTextShadowCompensation = inClassHtml.indexOf('text-shadow') !== -1 || allStyles.indexOf('text-shadow') !== -1;
    var highOverlays = overlayMatches.filter(function(op) { return op >= 0.5; });
    var lightOverlays = overlayMatches.filter(function(op) { return op < 0.5 && op > 0; });
    /* If text-shadow exists or a high-opacity overlay exists, consider it compensated */
    if (bgSlides.length > 0 && lightOverlays.length > 0 && !hasTextShadowCompensation && highOverlays.length === 0) {
      var minOpacity = Math.min.apply(null, lightOverlays);
      problems.push('Overlay com opacidade ' + minOpacity.toFixed(2) + ' sobre background-image (mín recomendado: 0.50). Texto pode ficar ilegível dependendo da foto.');
    }

    /* ── 4. Check for text-shadow on text over images ── */
    /* Only flag if no text-shadow AND no high-opacity overlay to compensate */
    var hasTextShadow = inClassHtml.indexOf('text-shadow') !== -1 || allStyles.indexOf('text-shadow') !== -1;
    if (bgSlides.length > 0 && !hasTextShadow && highOverlays.length === 0) {
      problems.push('Slides com imagem de fundo sem text-shadow. Adicionar text-shadow: 0 2px 8px rgba(0,0,0,0.6) para garantir legibilidade.');
    }

    /* ── 5. Check accent color used in headings on image slides ── */
    if (accent) {
      var accentInSlides = inClassHtml.indexOf('color:' + accent) !== -1 ||
        inClassHtml.indexOf('color: ' + accent) !== -1 ||
        inClassHtml.indexOf('color:var(--accent)') !== -1 ||
        inClassHtml.indexOf('color: var(--accent)') !== -1;
      var accentRGB2 = hexToRGB(accent);
      var accentLum2 = luminance(accentRGB2);
      /* Check accent against white — only flag if below 3:1 (severe) */
      var ratioOnWhite = contrastRatio(accentLum2, whiteLum);
      if (ratioOnWhite < 3 && accentInSlides) {
        problems.push('Cor accent ' + accent + ' tem contraste ' + ratioOnWhite.toFixed(1) + ':1 sobre fundo branco (mín 3:1 para legibilidade).');
      }
    }
  }

  if (problems.length === 0) {
    return { pass: true, details: 'Contraste e legibilidade OK', issues: [] };
  }
  return { pass: false, details: problems.length + ' problemas de contraste/legibilidade', issues: problems };
}

async function checkImages(html) {
  var imgRegex = /<\s*img[^>]+src\s*=\s*["']([^"']+)["']/gi;
  var urls = [];
  var im;
  while ((im = imgRegex.exec(html)) !== null) {
    if (urls.indexOf(im[1]) === -1) urls.push(im[1]);
  }
  var bgRegex = /background-image\s*:\s*url\s*\(\s*["']?([^"')]+)["']?\s*\)/gi;
  while ((im = bgRegex.exec(html)) !== null) {
    if (urls.indexOf(im[1]) === -1) urls.push(im[1]);
  }
  /* Check lesson cards without background-image */
  var headerImgRegex = /class\s*=\s*["'][^"']*lesson-header-img[^"']*["'][^>]*>/gi;
  var headerImgs = html.match(headerImgRegex) || [];
  var emptyBgs = [];
  headerImgs.forEach(function(tag) {
    if (tag.indexOf('background-image') === -1) { emptyBgs.push('lesson-header-img sem background-image'); }
  });
  /* Check empty background-image URLs */
  var emptyBgRegex = /background-image\s*:\s*url\s*\(\s*["']?\s*["']?\s*\)/gi;
  var emptyBgMatches = html.match(emptyBgRegex) || [];
  emptyBgs = emptyBgs.concat(emptyBgMatches.map(function() { return 'background-image com URL vazia'; }));

  if (urls.length === 0 && emptyBgs.length === 0) return { pass: true, details: 'Nenhuma imagem referenciada', broken: [] };
  if (urls.length === 0 && emptyBgs.length > 0) return { pass: false, details: emptyBgs.length + ' imagens sem URL', broken: emptyBgs };

  var toCheck = urls.slice(0, 20);
  var broken = emptyBgs.slice();

  for (var i = 0; i < toCheck.length; i++) {
    try {
      var u = toCheck[i];
      if (u.indexOf('data:') === 0) continue;
      if (u.indexOf('http') === 0) continue; /* Skip external URLs to avoid CORS */
      var resp = await fetch(u, { method: 'HEAD' });
      if (!resp.ok) broken.push(u);
    } catch (e) {
      broken.push(toCheck[i]);
    }
  }

  var extra = urls.length > 20 ? ' (verificadas ' + toCheck.length + ' de ' + urls.length + ')' : '';
  if (broken.length === 0) {
    return { pass: true, details: toCheck.length + '/' + toCheck.length + ' imagens OK' + extra, broken: [] };
  }
  return { pass: false, details: broken.length + ' imagens quebradas de ' + toCheck.length + extra, broken: broken };
}

/* ===================== MAIN AUDIT ===================== */

async function auditStudent(index) {
  var s = students[index];
  var btn = document.getElementById('btn-' + index);
  var body = document.getElementById('body-' + index);
  var statusEl = document.getElementById('status-' + index);
  var card = document.getElementById('card-' + index);

  if (!card.classList.contains('expanded')) card.classList.add('expanded');

  btn.disabled = true;
  btn.classList.add('running');
  btn.textContent = 'Auditando...';
  body.innerHTML = '<div class="audit-status">Buscando material de ' + escHtml(s.name) + '...</div>';

  var html;
  try {
    var resp = await fetch('/professor/' + s.slug + '.html');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    html = await resp.text();
  } catch (e) {
    body.innerHTML = '<div class="audit-status error">Arquivo /professor/' + s.slug + '.html não encontrado (' + escHtml(e.message) + ')</div>';
    btn.disabled = false;
    btn.classList.remove('running');
    btn.textContent = 'Auditar';
    updateStudentScore(index, null);
    /* Render placeholder lessons as NOT GENERATED */
    renderNotFoundLessons(index, s);
    return;
  }

  body.innerHTML = '<div class="audit-status">Detectando aulas e executando verificações...</div>';

  /* Detect lessons from main file */
  var detectedLessons = detectLessons(html);

  /* Also check for individual aula files (e.g. tania-rosa-aula2.html, roberto-pires-aula3.html) */
  var aulaFiles = [];
  for (var ai = 2; ai <= Math.min(s.totalLessons, 50); ai++) {
    aulaFiles.push({ num: ai, url: '/professor/' + s.slug + '-aula' + ai + '.html' });
  }
  for (var af = 0; af < aulaFiles.length; af++) {
    try {
      var aulaResp = await fetch(aulaFiles[af].url, { method: 'HEAD' });
      if (aulaResp.ok) {
        var aulaHtml = await (await fetch(aulaFiles[af].url)).text();
        var aulaLessons = detectLessons(aulaHtml);
        if (aulaLessons.length > 0) {
          aulaLessons.forEach(function(al) {
            al._sourceFile = aulaFiles[af].url;
            al._sourceHtml = aulaHtml;
            /* Individual aula file REPLACES placeholder from main file */
            var existingIdx = -1;
            detectedLessons.forEach(function(d, idx) { if (d.num === al.num) existingIdx = idx; });
            if (existingIdx !== -1) {
              detectedLessons[existingIdx] = al;
            } else {
              detectedLessons.push(al);
            }
          });
        }
      }
    } catch (e) { /* Individual aula file not found — that's OK */ }
  }
  detectedLessons.sort(function(a, b) { return a.num - b.num; });

  var detectedCount = detectedLessons.length;

  /* Update lesson count display */
  document.getElementById('lessons-' + index).textContent = detectedCount + '/' + s.totalLessons + ' aulas';

  /* Run file-wide checks */
  var fileChecks = {
    structure: checkStructure(html),
    palette: checkPalette(html, s.slug),
    javascript: checkJavaScript(html),
    svgs: checkSVGs(html),
    listeningPlayer: checkListeningPlayer(html),
    capitalization: checkCapitalization(html),
    voiceAlternation: checkVoiceAlternation(html),
    layout: checkLayout(html),
    lessonSelector: checkLessonSelector(html),
    exercises: checkExercises(html),
    emojis: checkEmojis(html),
    audioMap: checkAudioMap(html),
    voices: checkVoices(html),
    portuguese: checkPortuguese(html),
    contrast: checkContrast(html),
    ordering: checkOrdering(html),
    accents: checkAccents(html)
  };

  /* Run per-lesson checks */
  var lessonResults = [];

  for (var li = 0; li < detectedLessons.length; li++) {
    var lesson = detectedLessons[li];
    /* Use source HTML from individual aula file if available, otherwise from main file */
    var sourceHtml = lesson._sourceHtml || html;
    var lessonHtml = sourceHtml.substring(lesson.startIdx, lesson.endIdx);

    var checks = [];

    /* 1. Structure (file-wide, same for all lessons) */
    checks.push({ name: CHECK_NAMES[0], result: fileChecks.structure });

    /* 2. Pre-class etapas */
    checks.push({ name: CHECK_NAMES[1], result: checkPreclassLesson(lessonHtml, lesson.num) });

    /* 3. IN CLASS slides (use source file if from individual aula) */
    checks.push({ name: CHECK_NAMES[2], result: checkInClassSlides(sourceHtml) });

    /* 4. IN CLASS components */
    checks.push({ name: CHECK_NAMES[3], result: checkInClassComponents(sourceHtml, lesson.num) });

    /* 5. Teacher T icon */
    checks.push({ name: CHECK_NAMES[4], result: checkTeacherT(sourceHtml) });

    /* 6. Audio map */
    checks.push({ name: CHECK_NAMES[5], result: fileChecks.audioMap });

    /* 7. Audio MP3 files (placeholder, async) */
    checks.push({ name: CHECK_NAMES[6], result: { pass: null, details: 'Verificando...' } });

    /* 8. Voices */
    checks.push({ name: CHECK_NAMES[7], result: fileChecks.voices });

    /* 9. Zero Portuguese */
    checks.push({ name: CHECK_NAMES[8], result: fileChecks.portuguese });

    /* 10. Zero Emojis */
    checks.push({ name: CHECK_NAMES[9], result: fileChecks.emojis });

    /* 11. Images (placeholder, async) */
    checks.push({ name: CHECK_NAMES[10], result: { pass: null, details: 'Verificando...' } });

    /* 12. Exercises */
    checks.push({ name: CHECK_NAMES[11], result: fileChecks.exercises });

    /* 13. Palette */
    checks.push({ name: CHECK_NAMES[12], result: fileChecks.palette });

    /* 14. JavaScript */
    checks.push({ name: CHECK_NAMES[13], result: fileChecks.javascript });

    /* Check 15: SVG overflow */
    checks.push({ name: CHECK_NAMES[14], result: fileChecks.svgs });
    checks.push({ name: CHECK_NAMES[15], result: fileChecks.listeningPlayer });
    checks.push({ name: CHECK_NAMES[16], result: fileChecks.capitalization });
    checks.push({ name: CHECK_NAMES[17], result: fileChecks.voiceAlternation });
    checks.push({ name: CHECK_NAMES[18], result: fileChecks.layout });
    checks.push({ name: CHECK_NAMES[19], result: fileChecks.lessonSelector });

    /* Check 16: Contrast & Readability */
    checks.push({ name: CHECK_NAMES[20], result: fileChecks.contrast });

    /* Check 17: Ordering (new format + audio) */
    checks.push({ name: CHECK_NAMES[21], result: fileChecks.ordering });

    /* Check 18: Acentuação PT-BR */
    checks.push({ name: CHECK_NAMES[22], result: fileChecks.accents });

    /* Calculate score */
    var passed = checks.filter(function(c) { return c.result.pass === true; }).length;
    var total = checks.length;
    var score = Math.round((passed / total) * 100);

    lessonResults.push({
      num: lesson.num,
      name: lesson.name,
      score: score,
      checks: checks
    });
  }

  /* Render initial results */
  renderLessonResults(index, s, lessonResults, detectedCount);

  /* Run async checks */
  var audioFilesResult;
  try {
    audioFilesResult = await checkAudioFiles(html, s.slug);
  } catch (e) {
    audioFilesResult = { pass: false, details: 'Erro: ' + e.message, missing: [] };
  }

  var imagesResult;
  try {
    imagesResult = await checkImages(html);
  } catch (e) {
    imagesResult = { pass: false, details: 'Erro: ' + e.message, broken: [] };
  }

  /* Update async results in each lesson */
  lessonResults.forEach(function(lr) {
    lr.checks[6].result = audioFilesResult;  /* Audio MP3 files */
    lr.checks[10].result = imagesResult;     /* Images */
    /* Recalculate score */
    var passed = lr.checks.filter(function(c) { return c.result.pass === true; }).length;
    lr.score = Math.round((passed / lr.checks.length) * 100);
  });

  /* Store results */
  auditResults[s.slug] = lessonResults;

  /* Re-render with complete results */
  renderLessonResults(index, s, lessonResults, detectedCount);
  updateStudentScore(index, lessonResults);

  btn.disabled = false;
  btn.classList.remove('running');
  btn.textContent = 'Re-auditar';
  updateSummary();
}

/* ===================== RENDER ===================== */

function renderNotFoundLessons(index, s) {
  var body = document.getElementById('body-' + index);
  var html = '<div class="audit-results">';
  for (var i = 1; i <= Math.min(s.totalLessons, 10); i++) {
    html += '<div class="lesson-audit">' +
      '<div class="lesson-audit-header">' +
        SVG_CHEVRON_SM +
        '<span class="lesson-audit-num">Aula ' + i + '</span>' +
        '<span class="lesson-audit-name"></span>' +
        '<span class="tag-not-generated">NÃO GERADA</span>' +
      '</div>' +
    '</div>';
  }
  if (s.totalLessons > 10) {
    html += '<div style="text-align:center;padding:8px;color:var(--gray);font-size:.8rem;">+ ' + (s.totalLessons - 10) + ' aulas restantes</div>';
  }
  html += '</div>';
  body.innerHTML = html;
}

function renderLessonResults(index, student, lessonResults, detectedCount) {
  var body = document.getElementById('body-' + index);
  var currentSlug = student.slug;
  var html = '<div class="audit-results">';

  /* Detected lessons with results */
  lessonResults.forEach(function(lr, lrIdx) {
    var sClass = scoreClass(lr.score);
    var isFirst = lrIdx === 0;

    html += '<div class="lesson-audit' + (isFirst ? ' open' : '') + '">' +
      '<div class="lesson-audit-header" onclick="toggleLessonAudit(this)">' +
        SVG_CHEVRON_SM +
        '<span class="lesson-audit-num">Aula ' + lr.num + '</span>' +
        '<span class="lesson-audit-name">' + escHtml(lr.name) + '</span>' +
        '<span class="lesson-audit-score ' + sClass + '">' + lr.score + '%</span>' +
      '</div>' +
      '<div class="lesson-audit-body"><div class="lesson-audit-body-inner">';

    /* Check rows */
    var failures = [];
    lr.checks.forEach(function(c) {
      var cls, icon;
      if (c.result.pass === null) {
        cls = 'pending'; icon = SVG_PENDING;
      } else if (c.result.pass) {
        cls = 'pass'; icon = SVG_PASS;
      } else {
        cls = 'fail'; icon = SVG_FAIL;
      }

      html += '<div class="check-row ' + cls + '">' +
        icon +
        '<span class="check-name">' + escHtml(c.name) + '</span>' +
        '<span class="check-detail">' + escHtml(c.result.details) + '</span>' +
      '</div>';

      /* Collect failures */
      if (c.result.pass === false) {
        var detailText = '';
        if (c.result.missing && c.result.missing.length > 0) {
          c.result.missing.forEach(function(m) {
            detailText = m;
            var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
            failures.push('<li style="border-bottom:1px solid #fef0f0;padding:8px 0">' +
              '<div style="font-weight:600;font-size:.82rem;margin-bottom:3px">' + escHtml(c.name) + ': <code>' + escHtml(m) + '</code></div>' +
              '<div style="font-size:.73rem;color:#666;line-height:1.5;margin-bottom:4px">' +
              '<strong style="color:#003080">Regra:</strong> ' + escHtml(rule.regra) + ' | ' +
              '<strong style="color:#dc2626">Impacto:</strong> ' + escHtml(rule.impacto) + '</div>' +
              '<button onclick="copyFix(\'' + escAttr(c.name) + '\',\'' + escAttr(m) + '\',\'' + escAttr(currentSlug) + '\')" ' +
              'style="background:#003080;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;min-height:28px" ' +
              'aria-label="Copiar instrução de correção">Copiar instrução</button>' +
              '</li>');
          });
        } else if (c.result.broken && c.result.broken.length > 0) {
          c.result.broken.forEach(function(b) {
            detailText = b;
            var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
            failures.push('<li style="border-bottom:1px solid #fef0f0;padding:8px 0">' +
              '<div style="font-weight:600;font-size:.82rem;margin-bottom:3px">' + escHtml(c.name) + ': <code>' + escHtml(b) + '</code></div>' +
              '<div style="font-size:.73rem;color:#666;line-height:1.5;margin-bottom:4px">' +
              '<strong style="color:#003080">Regra:</strong> ' + escHtml(rule.regra) + ' | ' +
              '<strong style="color:#dc2626">Impacto:</strong> ' + escHtml(rule.impacto) + '</div>' +
              '<button onclick="copyFix(\'' + escAttr(c.name) + '\',\'' + escAttr(b) + '\',\'' + escAttr(currentSlug) + '\')" ' +
              'style="background:#003080;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;min-height:28px" ' +
              'aria-label="Copiar instrução de correção">Copiar instrução</button>' +
              '</li>');
          });
        } else if (c.result.issues && c.result.issues.length > 0) {
          c.result.issues.forEach(function(issue) {
            detailText = issue;
            var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
            failures.push('<li style="border-bottom:1px solid #fef0f0;padding:8px 0">' +
              '<div style="font-weight:600;font-size:.82rem;margin-bottom:3px">' + escHtml(c.name) + ': <code>' + escHtml(issue) + '</code></div>' +
              '<div style="font-size:.73rem;color:#666;line-height:1.5;margin-bottom:4px">' +
              '<strong style="color:#003080">Regra:</strong> ' + escHtml(rule.regra) + ' | ' +
              '<strong style="color:#dc2626">Impacto:</strong> ' + escHtml(rule.impacto) + '</div>' +
              '<button onclick="copyFix(\'' + escAttr(c.name) + '\',\'' + escAttr(issue) + '\',\'' + escAttr(currentSlug) + '\')" ' +
              'style="background:#003080;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;min-height:28px" ' +
              'aria-label="Copiar instrução de correção">Copiar instrução</button>' +
              '</li>');
          });
        } else if (c.result.found && c.result.found.length > 0) {
          c.result.found.forEach(function(f) {
            detailText = '"' + f.word + '" (' + f.count + 'x) — ' + f.context;
            var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
            failures.push('<li style="border-bottom:1px solid #fef0f0;padding:8px 0">' +
              '<div style="font-weight:600;font-size:.82rem;margin-bottom:3px">' + escHtml(c.name) + ': "' + escHtml(f.word) + '" (' + f.count + 'x) — <code>' + escHtml(f.context) + '</code></div>' +
              '<div style="font-size:.73rem;color:#666;line-height:1.5;margin-bottom:4px">' +
              '<strong style="color:#003080">Regra:</strong> ' + escHtml(rule.regra) + ' | ' +
              '<strong style="color:#dc2626">Impacto:</strong> ' + escHtml(rule.impacto) + '</div>' +
              '<button onclick="copyFix(\'' + escAttr(c.name) + '\',\'' + escAttr(detailText) + '\',\'' + escAttr(currentSlug) + '\')" ' +
              'style="background:#003080;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;min-height:28px" ' +
              'aria-label="Copiar instrução de correção">Copiar instrução</button>' +
              '</li>');
          });
        } else {
          detailText = c.result.details;
          var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
          failures.push('<li style="border-bottom:1px solid #fef0f0;padding:8px 0">' +
            '<div style="font-weight:600;font-size:.82rem;margin-bottom:3px">' + escHtml(c.name) + ': ' + escHtml(c.result.details) + '</div>' +
            '<div style="font-size:.73rem;color:#666;line-height:1.5;margin-bottom:4px">' +
            '<strong style="color:#003080">Regra:</strong> ' + escHtml(rule.regra) + ' | ' +
            '<strong style="color:#dc2626">Impacto:</strong> ' + escHtml(rule.impacto) + '</div>' +
            '<button onclick="copyFix(\'' + escAttr(c.name) + '\',\'' + escAttr(detailText) + '\',\'' + escAttr(currentSlug) + '\')" ' +
            'style="background:#003080;color:#fff;border:none;padding:4px 14px;border-radius:4px;font-size:.72rem;font-weight:600;cursor:pointer;min-height:28px" ' +
            'aria-label="Copiar instrução de correção">Copiar instrução</button>' +
            '</li>');
        }
      }
    });

    /* Failures block */
    if (failures.length > 0) {
      /* Store failure data for "Copy All" */
      var failData = [];
      lr.checks.forEach(function(c) {
        if (c.result.pass === false) {
          var rule = CHECK_RULES[c.name] || { regra: 'Ver CLAUDE.md', impacto: 'Verificar manualmente.' };
          var details = c.result.details || '';
          var items = [];
          if (c.result.missing) items = c.result.missing;
          else if (c.result.broken) items = c.result.broken;
          else if (c.result.issues) items = c.result.issues;
          failData.push({ name: c.name, details: details, rule: rule.regra, impact: rule.impacto, items: items });
        }
      });
      /* Store in global for copyAllFix */
      if (!window._auditFailures) window._auditFailures = {};
      window._auditFailures[currentSlug + '-' + lr.num] = { slug: currentSlug, lessonNum: lr.num, lessonName: lr.name, failures: failData };

      html += '<div class="fail-details">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
        '<h4 style="margin:0">' + SVG_FAIL + ' Problemas (' + failures.length + ')</h4>' +
        '<button onclick="copyAllFix(\'' + escAttr(currentSlug) + '-' + lr.num + '\')" ' +
        'style="background:#003080;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;min-height:36px;display:flex;align-items:center;gap:6px" ' +
        'aria-label="Copiar todos os problemas como prompt">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>' +
        'Copiar Todos os Problemas</button></div>' +
        '<ul>' + failures.join('') + '</ul>' +
      '</div>';
    }

    html += '</div></div></div>';
  });

  /* Not-generated lessons */
  var generatedNums = {};
  lessonResults.forEach(function(lr) { generatedNums[lr.num] = true; });

  var maxToShow = Math.min(student.totalLessons, 20);
  for (var i = 1; i <= maxToShow; i++) {
    if (!generatedNums[i]) {
      html += '<div class="lesson-audit">' +
        '<div class="lesson-audit-header">' +
          SVG_CHEVRON_SM +
          '<span class="lesson-audit-num">Aula ' + i + '</span>' +
          '<span class="lesson-audit-name"></span>' +
          '<span class="tag-not-generated">NÃO GERADA</span>' +
        '</div>' +
      '</div>';
    }
  }

  if (student.totalLessons > maxToShow) {
    var remaining = student.totalLessons - maxToShow;
    html += '<div style="text-align:center;padding:8px;color:var(--gray);font-size:.8rem;">+ ' + remaining + ' aulas restantes</div>';
  }

  html += '</div>';
  body.innerHTML = html;
}

/* ===================== SCORES ===================== */

function updateStudentScore(index, lessonResults) {
  var scoreEl = document.getElementById('score-' + index);
  if (!lessonResults || lessonResults.length === 0) {
    scoreEl.className = 'student-score score-none';
    scoreEl.textContent = 'N/A';
    return;
  }
  var totalChecks = 0;
  var passedChecks = 0;
  lessonResults.forEach(function(lr) {
    lr.checks.forEach(function(c) {
      totalChecks++;
      if (c.result.pass === true) passedChecks++;
    });
  });
  var pct = Math.round((passedChecks / totalChecks) * 100);
  scoreEl.className = 'student-score ' + scoreClass(pct);
  scoreEl.textContent = pct + '%';
  /* Persist score */
  var s = students[index];
  if (s) saveAudit(s.slug, pct, lessonResults.length);
  /* Update button text */
  var btn = document.getElementById('btn-' + index);
  if (btn) btn.textContent = 'Re-auditar';
}

function updateSummary() {
  var audited = Object.keys(auditResults).length;
  document.getElementById('sumAudited').textContent = audited;

  var totalLessonsAudited = 0;
  var totalChecks = 0;
  var totalPassed = 0;

  for (var slug in auditResults) {
    var lessons = auditResults[slug];
    totalLessonsAudited += lessons.length;
    lessons.forEach(function(lr) {
      lr.checks.forEach(function(c) {
        totalChecks++;
        if (c.result.pass === true) totalPassed++;
      });
    });
  }

  document.getElementById('sumLessons').textContent = totalLessonsAudited;

  if (totalChecks === 0) {
    document.getElementById('sumScore').textContent = '--';
    return;
  }
  var pct = Math.round((totalPassed / totalChecks) * 100);
  document.getElementById('sumScore').textContent = pct + '%';
}

async function auditAll() {
  var btn = document.getElementById('btnAuditAll');
  btn.disabled = true;
  btn.textContent = 'Auditando...';

  for (var i = 0; i < students.length; i++) {
    await auditStudent(i);
  }

  btn.disabled = false;
  btn.textContent = 'Auditar Todos';
}

/* ===================== INIT ===================== */
(async function() {
  var initContainer = document.getElementById('studentList');
  if (initContainer) initContainer.innerHTML = '<div class="audit-status">Carregando alunos do Supabase...</div>';
  await loadStudentsFromSupabase();
  document.getElementById('sumStudents').textContent = students.length;
  renderStudents();
})();
</script>
