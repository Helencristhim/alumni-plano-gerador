<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Audit | Alumni by Better</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f5f0; color: #2d2d3a; min-height: 100vh; }
.top-bar { background: #003080; color: #fff; padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
.top-bar h1 { font-size: 1.1rem; font-weight: 700; }
.container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
.controls {
  display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap;
  margin-bottom: 1.5rem; padding: 1rem;
  background: #fff; border: 1px solid #d4d4cc; border-radius: 10px;
}
.controls select {
  flex: 1; min-width: 240px; padding: 0.6rem 1rem; font-size: 0.88rem;
  font-family: inherit; border: 1px solid #d4d4cc; border-radius: 6px;
  background: #fafaf7; cursor: pointer;
}
.filter-group { display: flex; gap: 4px; }
.filter-btn {
  padding: 0.45rem 0.8rem; font-size: 0.75rem; font-weight: 600;
  border: 1px solid #d4d4cc; background: #fff; border-radius: 6px;
  cursor: pointer; font-family: inherit; transition: all 0.15s; min-height: 36px;
}
.filter-btn:hover { border-color: #003080; color: #003080; }
.filter-btn.active { background: #003080; color: #fff; border-color: #003080; }
.export-btn {
  padding: 0.45rem 1rem; font-size: 0.75rem; font-weight: 600;
  background: #d70c0c; color: #fff; border: none; border-radius: 6px;
  cursor: pointer; font-family: inherit; min-height: 36px;
}
.export-btn:hover { background: #b00a0a; }
.empty-state { text-align: center; padding: 4rem 2rem; color: #999; font-size: 0.9rem; }
.student-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 0.8rem; gap: 0.5rem;
}
.student-header h2 { font-size: 1.15rem; color: #1a1a2e; }
.reviewed { font-size: 0.78rem; color: #003080; font-weight: 600; }
.audio-table {
  width: 100%; border-collapse: collapse; font-size: 0.82rem;
  background: #fff; border: 1px solid #d4d4cc; border-radius: 10px; overflow: hidden;
}
.audio-table thead th {
  background: #003080; color: #fff; padding: 0.6rem 0.8rem;
  text-align: left; font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.audio-table tbody tr { border-bottom: 1px solid #eeeeea; transition: background 0.15s; }
.audio-table tbody tr:hover { background: rgba(0,48,128,0.02); }
.audio-table tbody tr.status-ok { background: rgba(22,163,74,0.06); }
.audio-table tbody tr.status-bad { background: rgba(220,38,38,0.06); }
.audio-table td { padding: 0.5rem 0.8rem; vertical-align: middle; }
.col-idx { width: 40px; color: #999; font-size: 0.72rem; text-align: center; }
.col-phrase { word-break: break-word; }
.col-size { width: 70px; color: #888; font-size: 0.75rem; }
.col-play { width: 50px; text-align: center; }
.col-status { width: 140px; }
.play-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: #003080; color: #fff; cursor: pointer; font-size: 0.9rem;
  display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.play-btn:hover { background: #004aad; }
.play-btn.playing { background: #d70c0c; }
.status-btns { display: flex; gap: 4px; }
.ok-btn, .bad-btn {
  padding: 0.3rem 0.6rem; font-size: 0.7rem; font-weight: 600;
  border-radius: 4px; cursor: pointer; font-family: inherit; min-height: 30px; transition: all 0.15s;
}
.ok-btn { background: rgba(22,163,74,0.08); color: #16a34a; border: 1px solid rgba(22,163,74,0.25); }
.ok-btn:hover { background: #16a34a; color: #fff; }
.bad-btn { background: rgba(220,38,38,0.08); color: #dc2626; border: 1px solid rgba(220,38,38,0.25); }
.bad-btn:hover { background: #dc2626; color: #fff; }
.status-ok .ok-btn { background: #16a34a; color: #fff; }
.status-bad .bad-btn { background: #dc2626; color: #fff; }
#tableContainer { display: none; }
@media (max-width: 640px) {
  .controls { flex-direction: column; }
  .controls select { min-width: 100%; }
  .col-size { display: none; }
}
</style>
</head>
<body>

<div class="top-bar"><h1>Audio Audit</h1></div>
<nav style="display:flex;gap:0;justify-content:center;padding:.5rem 0;background:rgba(245,245,240,.85);border-bottom:1px solid #d4d4cc;position:sticky;top:48px;z-index:99">
  <a href="index.html" style="padding:.7rem 1.2rem;font-size:.78rem;font-weight:500;color:#5c5c6c;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;transition:color .2s">Novo Aluno</a>
  <a href="dashboard.html" style="padding:.7rem 1.2rem;font-size:.78rem;font-weight:500;color:#5c5c6c;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;transition:color .2s">Painel de Alunos</a>
  <a href="controle-alunos.html" style="padding:.7rem 1.2rem;font-size:.78rem;font-weight:500;color:#5c5c6c;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;transition:color .2s">Controle de Alunos</a>
  <a href="governanca.html" style="padding:.7rem 1.2rem;font-size:.78rem;font-weight:500;color:#5c5c6c;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;transition:color .2s">Governan&#231;a</a>
  <a href="audio-audit.html" style="padding:.7rem 1.2rem;font-size:.78rem;font-weight:700;color:#003080;text-decoration:none;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #003080">Audio Audit</a>
</nav>

<div class="container">
  <div class="controls">
    <select id="studentSelect"><option value="">Selecione um aluno...</option></select>
    <div class="filter-group">
      <button class="filter-btn active" id="fAll">Todos</button>
      <button class="filter-btn" id="fPending">Pendentes</button>
      <button class="filter-btn" id="fBad">Problemas</button>
    </div>
    <button class="export-btn" id="exportBtn">Exportar Problemas</button>
  </div>

  <div id="emptyState" class="empty-state">Selecione um aluno para iniciar a auditoria.</div>

  <div id="tableContainer">
    <div class="student-header">
      <h2 id="studentName"></h2>
      <span class="reviewed" id="reviewedCount"></span>
    </div>
    <table class="audio-table">
      <thead><tr><th class="col-idx">#</th><th>Frase</th><th class="col-size">Tam.</th><th class="col-play">Play</th><th class="col-status">Status</th></tr></thead>
      <tbody id="audioBody"></tbody>
    </table>
  </div>
</div>

<script src="/audio-data.js"></script>
<script src="/lib/supabase-config.js"></script>
<script>
(function() {
  var currentSlug = '';
  var currentFilter = 'all';
  var currentAudio = null;
  var currentPlayBtn = null;
  var auditState = {};

  // Load from Supabase on init
  sb.from('audio_audit').select('student_slug,file_name,status').then(function(res) {
    if (res.data) {
      res.data.forEach(function(row) {
        if (!auditState[row.student_slug]) auditState[row.student_slug] = {};
        auditState[row.student_slug][row.file_name] = row.status;
      });
    }
  });

  var sel = document.getElementById('studentSelect');
  var slugs = Object.keys(STUDENTS).sort();
  for (var i = 0; i < slugs.length; i++) {
    var s = slugs[i];
    var lbl = s.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    var o = document.createElement('option');
    o.value = s;
    o.textContent = lbl + ' (' + STUDENTS[s].length + ' audios)';
    sel.appendChild(o);
  }

  sel.addEventListener('change', function() {
    currentSlug = this.value;
    if (currentSlug) {
      renderStudent(currentSlug);
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'block';
    } else {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('tableContainer').style.display = 'none';
    }
  });

  document.getElementById('fAll').addEventListener('click', function() { setFilter('all', this); });
  document.getElementById('fPending').addEventListener('click', function() { setFilter('pending', this); });
  document.getElementById('fBad').addEventListener('click', function() { setFilter('bad', this); });
  document.getElementById('exportBtn').addEventListener('click', exportProblems);

  function setFilter(f, btn) {
    currentFilter = f;
    var btns = document.querySelectorAll('.filter-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    btn.classList.add('active');
    applyFilter();
  }

  function renderStudent(slug) {
    var files = STUDENTS[slug];
    if (!files) return;
    var lbl = slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    document.getElementById('studentName').textContent = lbl;
    var body = document.getElementById('audioBody');
    body.innerHTML = '';

    for (var i = 0; i < files.length; i++) {
      var fname = files[i][0];
      var fsize = files[i][1];
      var phrase = fname.replace('.mp3', '').replace(/_/g, ' ');
      var st = (auditState[slug] && auditState[slug][fname]) || '';
      var tr = document.createElement('tr');
      if (st) tr.className = 'status-' + st;
      tr.setAttribute('data-file', fname);
      tr.setAttribute('data-status', st);
      tr.innerHTML =
        '<td class="col-idx">' + (i + 1) + '</td>' +
        '<td class="col-phrase">' + phrase + '</td>' +
        '<td class="col-size">' + fsize + ' KB</td>' +
        '<td class="col-play"><button class="play-btn" data-src="/audio/' + slug + '/' + fname + '">&#9654;</button></td>' +
        '<td class="col-status"><div class="status-btns"><button class="ok-btn">OK</button><button class="bad-btn">Problema</button></div></td>';
      body.appendChild(tr);
    }
    updateCount();
    applyFilter();
  }

  document.getElementById('audioBody').addEventListener('click', function(e) {
    var pb = e.target.closest('.play-btn');
    if (pb) { playAudio(pb); return; }
    var ob = e.target.closest('.ok-btn');
    if (ob) { markRow(ob, 'ok'); return; }
    var bb = e.target.closest('.bad-btn');
    if (bb) { markRow(bb, 'bad'); return; }
  });

  function playAudio(btn) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      if (currentPlayBtn) { currentPlayBtn.classList.remove('playing'); currentPlayBtn.innerHTML = '&#9654;'; }
    }
    if (currentPlayBtn === btn) { currentAudio = null; currentPlayBtn = null; return; }
    var audio = new Audio(btn.getAttribute('data-src'));
    audio.play();
    btn.classList.add('playing');
    btn.innerHTML = '&#9632;';
    currentAudio = audio;
    currentPlayBtn = btn;
    audio.onended = function() {
      btn.classList.remove('playing');
      btn.innerHTML = '&#9654;';
      currentAudio = null;
      currentPlayBtn = null;
    };
    audio.onerror = function() {
      btn.classList.remove('playing');
      btn.innerHTML = '!';
      btn.style.background = '#d97706';
      currentAudio = null;
      currentPlayBtn = null;
    };
  }

  function markRow(btn, status) {
    var tr = btn.closest('tr');
    var fname = tr.getAttribute('data-file');
    tr.className = 'status-' + status;
    tr.setAttribute('data-status', status);
    if (!auditState[currentSlug]) auditState[currentSlug] = {};
    auditState[currentSlug][fname] = status;
    updateCount();
    // Save to Supabase (upsert)
    sb.from('audio_audit').upsert({
      student_slug: currentSlug,
      file_name: fname,
      status: status,
      updated_at: new Date().toISOString()
    }, { onConflict: 'student_slug,file_name' });
  }

  function updateCount() {
    var rows = document.getElementById('audioBody').querySelectorAll('tr');
    var total = rows.length, reviewed = 0, bad = 0;
    for (var i = 0; i < rows.length; i++) {
      var st = rows[i].getAttribute('data-status');
      if (st === 'ok' || st === 'bad') reviewed++;
      if (st === 'bad') bad++;
    }
    var txt = reviewed + '/' + total + ' revisados';
    if (bad > 0) txt += ' (' + bad + ' problemas)';
    document.getElementById('reviewedCount').textContent = txt;
  }

  function applyFilter() {
    var rows = document.getElementById('audioBody').querySelectorAll('tr');
    for (var i = 0; i < rows.length; i++) {
      var st = rows[i].getAttribute('data-status') || '';
      if (currentFilter === 'all') rows[i].style.display = '';
      else if (currentFilter === 'pending') rows[i].style.display = (!st) ? '' : 'none';
      else if (currentFilter === 'bad') rows[i].style.display = (st === 'bad') ? '' : 'none';
    }
  }

  function exportProblems() {
    var lines = ['PROBLEMAS DE AUDIO', '==================', ''];
    var found = false;
    var keys = Object.keys(auditState).sort();
    for (var i = 0; i < keys.length; i++) {
      var sl = keys[i];
      var probs = [];
      var fk = Object.keys(auditState[sl]);
      for (var j = 0; j < fk.length; j++) {
        if (auditState[sl][fk[j]] === 'bad') probs.push(fk[j].replace('.mp3', '').replace(/_/g, ' '));
      }
      if (probs.length > 0) {
        found = true;
        var lb = sl.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
        lines.push(lb + ' (' + probs.length + '):');
        for (var k = 0; k < probs.length; k++) lines.push('  - ' + probs[k]);
        lines.push('');
      }
    }
    if (!found) { alert('Nenhum problema marcado!'); return; }
    var blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audio-problems.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
})();
</script>
</body>
</html>
